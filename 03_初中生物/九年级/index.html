<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初中9年级生物 - 课件首页 | TeachAny</title>
  <link rel="stylesheet" href="shared/styles.css?v=8.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/focus-mode.css?v=1.0">
    <link rel="stylesheet" href="shared/micro-interactions.css?v=1.0">
  <style>
    :root {
      --primary: var(--primary);
      --primary-light: #8BC34A;
      --primary-dark: #33691E;
      --bg-light: #f5f7fa;
      --bg-card: #ffffff;
      --text-dark: #1a1a2e;
      --text-muted: #6c7293;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-light); color: var(--text-dark); line-height: 1.6;
    }
    .hero-section {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      color: white; padding: 48px 20px; text-align: center;
    }
    .hero-icon { font-size: 48px; margin-bottom: 16px; }
    .hero-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }
    .hero-subtitle { font-size: 1rem; opacity: 0.9; }
    .back-home {
      position: fixed; top: 20px; left: 20px; z-index: 1000;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary, #555); color: white; text-decoration: none;
      padding: 8px 20px; border-radius: 20px; font-size: 0.9rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      transition: all 0.2s;
    }
    .back-home:hover { filter: brightness(1.15); transform: translateX(-4px); }
    .main-content { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: var(--primary-dark); }
    .lesson-card {
      display: flex; align-items: center; gap: 16px; background: var(--bg-card);
      padding: 20px 24px; border-radius: 12px; margin-bottom: 12px;
      text-decoration: none; color: var(--text-dark);
      box-shadow: var(--shadow-sm); transition: all 0.3s;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .lesson-card:hover { box-shadow: var(--shadow-md); transform: translateX(4px); border-color: var(--primary-light); }
    .lesson-icon { width: 48px; height: 48px; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .lesson-title { flex: 1; font-weight: 600; font-size: 1.05rem; }
    .lesson-arrow { color: var(--primary-light); font-size: 14px; }
  </style>
</head>
<body>
  <section class="hero-section">
    <div class="hero-icon"><i class="fa-solid fa-dna"></i></div>
    <h1 class="hero-title">初中9年级生物</h1>
    <p class="hero-subtitle">生命解码者 · 冲刺中考</p>
    <a href="../../index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> 返回主页</a>
  </section>
  <div class="main-content">
    <!-- 环形学习进度组件 -->
    <div class="progress-ring-container" style="display:flex;align-items:center;gap:16px;padding:20px;background:white;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,0.08);max-width:500px;margin:20px auto;">
      <svg width="80" height="80" viewBox="0 0 80 80" class="progress-ring">
        <circle cx="40" cy="40" r="34" fill="none" stroke="#e0e0e0" stroke-width="6"/>
        <circle cx="40" cy="40" r="34" fill="none" stroke="var(--primary)" stroke-width="6"
                stroke-dasharray="213.6" stroke-dashoffset="213.6"
                transform="rotate(-90 40 40)" class="progress-ring-fill"
                style="transition:stroke-dashoffset 0.5s ease;"/>
      </svg>
      <div>
        <div style="font-size:1.5rem;font-weight:700;color:var(--primary);" class="progress-percent">0%</div>
        <div style="font-size:0.85rem;color:#666;">学习进度</div>
      </div>
    </div>
    <script>
    (function(){
      function initProgressRing(){
        // Count lesson cards
        var cards = document.querySelectorAll('.lesson-card');
        var total = cards.length;
        var storeKey = 'teachany_visited';
        var gradeFolder = (location.pathname.split('/').slice(-2,-1)[0]) || 'grade';
        var visited = [];
        try { visited = JSON.parse(localStorage.getItem(storeKey) || '[]'); } catch(e){ visited = []; }
        if (!Array.isArray(visited)) visited = [];
        // 记录当前页课件点击 -> 标记为已访问（按年级命名空间隔离）
        cards.forEach(function(card){
          card.addEventListener('click', function(){
            try {
              var v = JSON.parse(localStorage.getItem(storeKey) || '[]');
              if (!Array.isArray(v)) v = [];
              var id = gradeFolder + '/' + card.getAttribute('href');
              if (v.indexOf(id) === -1) { v.push(id); localStorage.setItem(storeKey, JSON.stringify(v)); }
            } catch(e){}
          });
        });
        // 统计已访问课件数（基于当前页课件 href 匹配）
        var completed = 0;
        cards.forEach(function(card){
          var id = gradeFolder + '/' + card.getAttribute('href');
          if (visited.indexOf(id) > -1) completed++;
        });
        var percent = total > 0 ? Math.round(completed / total * 100) : 0;
        var ring = document.querySelector('.progress-ring-fill');
        var text = document.querySelector('.progress-percent');
        if (ring && text) {
          var circumference = 2 * Math.PI * 34;
          ring.style.strokeDashoffset = circumference * (1 - percent / 100);
          text.textContent = percent + '%';
        }
      }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initProgressRing);
      } else {
        initProgressRing();
      }
    })();
    </script>

    <h2 class="section-title"><i class="fa-solid fa-list-ul"></i> 单元目录</h2>
    <p style="color:var(--text-muted);text-align:center;padding:40px;">课件制作中...</p>
  </div>
  <script src="shared/mascot.js?v=8.0"></script>
  <script src="shared/badges.js?v=8.0"></script>
<script src="shared/subject-signature.js?v=1.0"></script>

<script src="shared/focus-mode.js?v=1.0"></script>

<script src="shared/scroll-narrative.js?v=1.0"></script>

<script src="shared/breadcrumb-backtop.js?v=1.0"></script>
</body>
</html>
