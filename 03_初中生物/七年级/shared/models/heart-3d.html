<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>心脏 3D 模型 | 初中生物</title>
  <style>
    :root {
      --primary: #558B2F;
      --primary-light: #8BC34A;
      --primary-dark: #33691E;
      --bg-light: #f1f8e9;
      --text-dark: #1a1a2e;
      --text-muted: #5d6d7e;
      --shadow-md: 0 4px 20px rgba(46,125,50,0.12);
      --shadow-lg: 0 8px 32px rgba(46,125,50,0.18);
      --artery: #E53935;
      --vein: #1E88E5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: #fff; padding: 14px 20px; box-shadow: var(--shadow-md);
      position: relative; z-index: 20; flex-shrink: 0;
    }
    .header-row {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); color: #fff; text-decoration: none;
      padding: 8px 16px; border-radius: 22px; font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.35); backdrop-filter: blur(8px);
      transition: background 0.25s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .back-btn svg { width: 16px; height: 16px; }
    .title-block { flex: 1; min-width: 200px; }
    .title { font-size: 1.45rem; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.18); }
    .subtitle { font-size: 0.85rem; opacity: 0.92; margin-top: 2px; }

    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #canvas-container { position: absolute; inset: 0; }
    #canvas-container canvas { display: block; }

    .hint {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.85); color: var(--primary-dark);
      padding: 6px 16px; border-radius: 18px; font-size: 0.8rem;
      box-shadow: var(--shadow-md); pointer-events: none; z-index: 10; white-space: nowrap;
    }

    .beat-toggle {
      position: absolute; top: 14px; right: 16px; z-index: 11;
      background: #fff; color: var(--primary-dark); border: none;
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
      box-shadow: var(--shadow-md); font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
    }
    .beat-toggle:hover { background: #f1f8e9; }
    .beat-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--artery); animation: blink 0.85s ease-in-out infinite; }
    @keyframes blink { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }

    .info-card {
      position: absolute; top: 60px; right: 16px; width: 290px; max-width: calc(100% - 32px);
      background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg);
      padding: 16px 18px; z-index: 15;
      transform: translateX(120%); transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
      border-top: 4px solid var(--primary);
    }
    .info-card.show { transform: translateX(0); }
    .info-card .ic-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .info-card .ic-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .info-card .ic-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
    .info-card .ic-func { font-size: 0.88rem; color: var(--text-muted); line-height: 1.55; }
    .info-card .ic-close {
      position: absolute; top: 10px; right: 12px;
      width: 24px; height: 24px; line-height: 22px; text-align: center;
      border: none; background: #f1f8e9; color: var(--primary-dark);
      border-radius: 50%; font-size: 1rem; cursor: pointer;
    }
    .info-card .ic-close:hover { background: #dcedc8; }

    .label3d {
      position: absolute; transform: translate(-50%, -120%);
      background: rgba(255,255,255,0.92); color: var(--text-dark);
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); pointer-events: none;
      white-space: nowrap; z-index: 8; border: 1px solid rgba(0,0,0,0.06);
    }

    .legend {
      flex-shrink: 0; background: #fff; border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05); padding: 12px 16px; z-index: 12;
    }
    .legend-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 8px 18px; justify-content: center;
    }
    .legend-title { width: 100%; text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
    .legend-group { display: flex; align-items: center; gap: 6px; padding: 0 10px; border-left: 2px solid #e0e0e0; }
    .legend-group:first-of-type { border-left: none; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .legend-item:hover { opacity: 0.7; }
    .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .legend-group-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; }

    @media (max-width: 600px) {
      .title { font-size: 1.2rem; }
      .subtitle { font-size: 0.78rem; }
      .info-card { width: 250px; top: 52px; right: 8px; }
      .legend-item, .legend-group-label { font-size: 0.72rem; }
      .hint { font-size: 0.7rem; padding: 5px 12px; }
      .beat-toggle { font-size: 0.74rem; padding: 6px 12px; right: 8px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-row">
      <a href="../../index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        返回目录
      </a>
      <div class="title-block">
        <div class="title">心脏 3D 模型</div>
        <div class="subtitle">红色为动脉血 · 蓝色为静脉血 · 拖拽旋转 · 点击结构查看名称与功能</div>
      </div>
    </div>
  </header>

  <div class="stage">
    <div class="hint">鼠标拖拽旋转 / 滚轮缩放 / 点击结构查看详情</div>
    <button class="beat-toggle" id="beatToggle"><span class="beat-dot"></span><span id="beatText">搏动中</span></button>
    <div id="canvas-container"></div>
    <div class="info-card" id="infoCard">
      <button class="ic-close" id="icClose">&times;</button>
      <div class="ic-head">
        <span class="ic-dot" id="icDot"></span>
        <span class="ic-name" id="icName">名称</span>
      </div>
      <div class="ic-func" id="icFunc">功能说明</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-inner" id="legend">
      <div class="legend-title">结构图例（红色=动脉血，蓝色=静脉血）</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from '../lib/three/three.module.js';

    // ===== 结构信息定义 =====
    // 红色=动脉血(含氧丰富)，蓝色=静脉血(含氧少)
    const PARTS = [
      { id: 'la',  name: '左心房',   color: '#E53935', group: '腔室', func: '接收来自肺静脉的富含氧气的动脉血，将其压入左心室。' },
      { id: 'lv',  name: '左心室',   color: '#E53935', group: '腔室', func: '心脏最厚实的腔室，将动脉血泵入主动脉，输送到全身。壁最厚。' },
      { id: 'ra',  name: '右心房',   color: '#1E88E5', group: '腔室', func: '接收来自上、下腔静脉的缺氧静脉血，将其压入右心室。' },
      { id: 'rv',  name: '右心室',   color: '#1E88E5', group: '腔室', func: '将静脉血泵入肺动脉，送往肺部进行气体交换。' },
      { id: 'aorta', name: '主动脉', color: '#E53935', group: '血管', func: '人体最粗大的动脉，将左心室的动脉血输送到全身各处。' },
      { id: 'pa',  name: '肺动脉',   color: '#1E88E5', group: '血管', func: '把右心室的静脉血输送到肺部，是唯一运送静脉血的动脉。' },
      { id: 'svc', name: '上腔静脉', color: '#1E88E5', group: '血管', func: '收集头部和上肢的静脉血，流入右心房。' },
      { id: 'ivc', name: '下腔静脉', color: '#1E88E5', group: '血管', func: '收集下肢和腹部脏器的静脉血，流入右心房。' }
    ];

    // ===== 渲染基础设置 =====
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f8e9);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / Math.max(1, container.clientHeight), 0.1, 1000);
    camera.position.set(0, 0, 12);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(6, 9, 6);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
    fillLight.position.set(-6, -3, -5);
    scene.add(fillLight);

    const heartGroup = new THREE.Group();
    scene.add(heartGroup);

    const clickableMeshes = [];
    const labelData = [];
    const pulsingMeshes = []; // 搏动缩放的对象 { mesh, base: Vector3 }

    function addLabel(mesh, name, color, offsetVec) {
      labelData.push({ mesh, name, color, offset: offsetVec.clone() });
    }
    function getPart(id) { return PARTS.find(p => p.id === id); }

    // 心脏肌肉外壳材质（半透明）
    const muscleMat = new THREE.MeshStandardMaterial({
      color: 0xB71C1C, transparent: true, opacity: 0.22, roughness: 0.6, side: THREE.DoubleSide
    });

    // --- 左心室（红色，最大，位于左下） ---
    const lvBase = new THREE.Vector3(-0.75, -0.7, 0.1);
    const lv = new THREE.Mesh(
      new THREE.SphereGeometry(1.5, 40, 32),
      new THREE.MeshStandardMaterial({ color: 0xE53935, roughness: 0.45, transparent: true, opacity: 0.92 })
    );
    lv.position.copy(lvBase);
    lv.scale.set(1.0, 1.35, 0.95);
    lv.userData = getPart('lv');
    heartGroup.add(lv);
    clickableMeshes.push(lv);
    pulsingMeshes.push({ mesh: lv, base: lv.scale.clone() });
    addLabel(lv, '左心室', '#E53935', new THREE.Vector3(-0.75, -2.0, 0.1));

    // --- 右心室（蓝色，右下） ---
    const rvBase = new THREE.Vector3(0.85, -0.6, 0.15);
    const rv = new THREE.Mesh(
      new THREE.SphereGeometry(1.3, 40, 32),
      new THREE.MeshStandardMaterial({ color: 0x1E88E5, roughness: 0.45, transparent: true, opacity: 0.92 })
    );
    rv.position.copy(rvBase);
    rv.scale.set(0.95, 1.2, 0.9);
    rv.userData = getPart('rv');
    heartGroup.add(rv);
    clickableMeshes.push(rv);
    pulsingMeshes.push({ mesh: rv, base: rv.scale.clone() });
    addLabel(rv, '右心室', '#1E88E5', new THREE.Vector3(0.85, -1.7, 0.15));

    // --- 左心房（红色，左上） ---
    const la = new THREE.Mesh(
      new THREE.SphereGeometry(0.95, 36, 28),
      new THREE.MeshStandardMaterial({ color: 0xEF5350, roughness: 0.45, transparent: true, opacity: 0.92 })
    );
    la.position.set(-1.0, 1.25, -0.1);
    la.scale.set(1.0, 0.85, 0.95);
    la.userData = getPart('la');
    heartGroup.add(la);
    clickableMeshes.push(la);
    pulsingMeshes.push({ mesh: la, base: la.scale.clone() });
    addLabel(la, '左心房', '#E53935', new THREE.Vector3(-1.0, 2.0, -0.1));

    // --- 右心房（蓝色，右上） ---
    const ra = new THREE.Mesh(
      new THREE.SphereGeometry(0.95, 36, 28),
      new THREE.MeshStandardMaterial({ color: 0x42A5F5, roughness: 0.45, transparent: true, opacity: 0.92 })
    );
    ra.position.set(1.05, 1.2, 0.15);
    ra.scale.set(1.0, 0.85, 0.95);
    ra.userData = getPart('ra');
    heartGroup.add(ra);
    clickableMeshes.push(ra);
    pulsingMeshes.push({ mesh: ra, base: ra.scale.clone() });
    addLabel(ra, '右心房', '#1E88E5', new THREE.Vector3(1.05, 1.95, 0.15));

    // ===== 血管 =====
    // 主动脉（红色，弓形） — 从左心室上方伸出并弓形转向
    const aortaCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(-0.6, 0.4, -0.1),
      new THREE.Vector3(-0.4, 1.6, -0.2),
      new THREE.Vector3(-0.2, 2.7, -0.2),
      new THREE.Vector3(0.6, 3.0, -0.2),
      new THREE.Vector3(1.4, 2.7, -0.1),
      new THREE.Vector3(1.7, 1.9, 0.0)
    ]);
    const aorta = new THREE.Mesh(
      new THREE.TubeGeometry(aortaCurve, 70, 0.32, 16, false),
      new THREE.MeshStandardMaterial({ color: 0xE53935, roughness: 0.45 })
    );
    aorta.userData = getPart('aorta');
    heartGroup.add(aorta);
    clickableMeshes.push(aorta);
    addLabel(aorta, '主动脉', '#E53935', new THREE.Vector3(0.6, 3.4, -0.2));

    // 肺动脉（蓝色，从右心室向上）
    const paCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(0.9, 0.4, 0.2),
      new THREE.Vector3(0.6, 1.5, 0.1),
      new THREE.Vector3(0.0, 2.5, 0.0),
      new THREE.Vector3(-0.5, 3.1, 0.0)
    ]);
    const pa = new THREE.Mesh(
      new THREE.TubeGeometry(paCurve, 60, 0.28, 16, false),
      new THREE.MeshStandardMaterial({ color: 0x1E88E5, roughness: 0.45 })
    );
    pa.userData = getPart('pa');
    heartGroup.add(pa);
    clickableMeshes.push(pa);
    addLabel(pa, '肺动脉', '#1E88E5', new THREE.Vector3(-0.5, 3.5, 0.0));

    // 上腔静脉（蓝色，从上方进入右心房）
    const svc = new THREE.Mesh(
      new THREE.CylinderGeometry(0.26, 0.3, 1.9, 20, 1, false),
      new THREE.MeshStandardMaterial({ color: 0x1E88E5, roughness: 0.45 })
    );
    svc.position.set(1.6, 2.5, 0.25);
    svc.userData = getPart('svc');
    heartGroup.add(svc);
    clickableMeshes.push(svc);
    addLabel(svc, '上腔静脉', '#1E88E5', new THREE.Vector3(2.2, 2.7, 0.25));

    // 下腔静脉（蓝色，从下方进入右心房）
    const ivcCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(1.9, -2.4, 0.3),
      new THREE.Vector3(1.7, -1.2, 0.3),
      new THREE.Vector3(1.45, 0.2, 0.3)
    ]);
    const ivc = new THREE.Mesh(
      new THREE.TubeGeometry(ivcCurve, 40, 0.3, 16, false),
      new THREE.MeshStandardMaterial({ color: 0x1E88E5, roughness: 0.45 })
    );
    ivc.userData = getPart('ivc');
    heartGroup.add(ivc);
    clickableMeshes.push(ivc);
    addLabel(ivc, '下腔静脉', '#1E88E5', new THREE.Vector3(2.3, -2.0, 0.3));

    // 整体轻微倾斜，使心尖朝左下
    heartGroup.rotation.z = 0.18;

    // ===== 标签 DOM =====
    const labelElements = [];
    labelData.forEach(ld => {
      const el = document.createElement('div');
      el.className = 'label3d';
      el.textContent = ld.name;
      el.style.borderLeft = `3px solid ${ld.color}`;
      container.appendChild(el);
      labelElements.push(el);
    });

    // ===== 图例 =====
    const legendEl = document.getElementById('legend');
    ['腔室', '血管'].forEach(g => {
      const grp = document.createElement('div');
      grp.className = 'legend-group';
      const label = document.createElement('span');
      label.className = 'legend-group-label';
      label.textContent = g + '：';
      grp.appendChild(label);
      PARTS.filter(p => p.group === g).forEach(o => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        item.innerHTML = `<span class="legend-dot" style="background:${o.color}"></span>${o.name}`;
        item.addEventListener('click', () => showInfo(o));
        grp.appendChild(item);
      });
      legendEl.appendChild(grp);
    });

    // ===== 交互 =====
    const dom = renderer.domElement;
    dom.style.touchAction = 'none';

    let isDragging = false;
    let downX = 0, downY = 0, prevX = 0, prevY = 0;
    let targetRotX = 0.1, targetRotY = 0;
    let curRotX = 0.1, curRotY = 0;
    let autoRotate = true;
    let autoTimer = null;

    dom.addEventListener('pointerdown', (e) => {
      isDragging = true; autoRotate = false; clearTimeout(autoTimer);
      downX = prevX = e.clientX; downY = prevY = e.clientY;
      dom.setPointerCapture(e.pointerId);
    });
    dom.addEventListener('pointerup', (e) => {
      isDragging = false;
      const moved = Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY);
      if (moved < 6) handleClick(e);
      autoTimer = setTimeout(() => { autoRotate = true; }, 2500);
    });
    dom.addEventListener('pointercancel', () => { isDragging = false; });
    dom.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      targetRotY += (e.clientX - prevX) * 0.008;
      targetRotX += (e.clientY - prevY) * 0.008;
      targetRotX = Math.max(-1.3, Math.min(1.3, targetRotX));
      prevX = e.clientX; prevY = e.clientY;
    });
    dom.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.position.z = Math.max(6, Math.min(24, camera.position.z + e.deltaY * 0.012));
    }, { passive: false });

    // ===== 射线点击 =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function handleClick(e) {
      const rect = dom.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (hits.length > 0) showInfo(hits[0].object.userData);
    }

    // ===== 信息卡 =====
    const infoCard = document.getElementById('infoCard');
    const icDot = document.getElementById('icDot');
    const icName = document.getElementById('icName');
    const icFunc = document.getElementById('icFunc');
    function showInfo(o) {
      if (!o) return;
      icDot.style.background = o.color;
      icName.textContent = o.name;
      icFunc.textContent = o.func;
      infoCard.style.borderTopColor = o.color;
      infoCard.classList.add('show');
    }
    document.getElementById('icClose').addEventListener('click', () => infoCard.classList.remove('show'));

    // ===== 搏动开关 =====
    let beating = true;
    const beatToggle = document.getElementById('beatToggle');
    const beatText = document.getElementById('beatText');
    beatToggle.addEventListener('click', () => {
      beating = !beating;
      beatText.textContent = beating ? '搏动中' : '已暂停';
      beatToggle.querySelector('.beat-dot').style.animationPlayState = beating ? 'running' : 'paused';
    });

    // ===== 标签更新 =====
    const tmpVec = new THREE.Vector3();
    function updateLabels() {
      labelData.forEach((ld, i) => {
        const el = labelElements[i];
        ld.mesh.getWorldPosition(tmpVec);
        tmpVec.add(ld.offset);
        tmpVec.project(camera);
        if (tmpVec.z > 1) { el.style.display = 'none'; return; }
        const x = (tmpVec.x * 0.5 + 0.5) * container.clientWidth;
        const y = (-tmpVec.y * 0.5 + 0.5) * container.clientHeight;
        el.style.display = 'block';
        el.style.left = x + 'px'; el.style.top = y + 'px';
      });
    }

    function onResize() {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w / Math.max(1, h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ===== 动画循环（含搏动） =====
    let beatTime = 0;
    function animate() {
      requestAnimationFrame(animate);
      if (autoRotate && !isDragging) targetRotY += 0.0025;
      curRotX += (targetRotX - curRotX) * 0.12;
      curRotY += (targetRotY - curRotY) * 0.12;
      heartGroup.rotation.x = curRotX;
      // 在初始 z 倾斜基础上叠加 y 旋转（用单独的容器更稳妥，这里直接用 y）
      heartGroup.rotation.y = curRotY;

      // 搏动：两次心跳的“咚-哒”节奏
      if (beating) {
        beatTime += 0.045;
        // 周期约 1.4s；用两个正弦峰模拟收缩（S1）与舒张（S2）
        const phase = beatTime % (Math.PI * 2);
        const p1 = Math.pow(Math.max(0, Math.sin(phase * 1.0)), 6);
        const p2 = Math.pow(Math.max(0, Math.sin(phase * 1.0 - 0.9)), 6) * 0.6;
        const pulse = p1 + p2; // 0 ~ 1.6
        const s = 1 + pulse * 0.07;
        pulsingMeshes.forEach(p => {
          p.mesh.scale.set(p.base.x * s, p.base.y * s, p.base.z * s);
        });
      }

      updateLabels();
      renderer.render(scene, camera);
    }
    animate();
    onResize();
  </script>
</body>
</html>
