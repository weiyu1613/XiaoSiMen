<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D 消化系统全景 | 初中生物</title>
  <style>
    :root {
      --primary: #558B2F;
      --primary-light: #8BC34A;
      --primary-dark: #33691E;
      --bg-light: #f1f8e9;
      --text-dark: #1a1a2e;
      --text-muted: #5d6d7e;
      --shadow-md: 0 4px 20px rgba(46,125,50,0.12);
      --shadow-lg: 0 8px 32px rgba(46,125,50,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: #fff; padding: 14px 20px; box-shadow: var(--shadow-md);
      position: relative; z-index: 20; flex-shrink: 0;
    }
    .header-row {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); color: #fff; text-decoration: none;
      padding: 8px 16px; border-radius: 22px; font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.35); backdrop-filter: blur(8px);
      transition: background 0.25s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .back-btn svg { width: 16px; height: 16px; }
    .title-block { flex: 1; min-width: 200px; }
    .title { font-size: 1.45rem; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.18); }
    .subtitle { font-size: 0.85rem; opacity: 0.92; margin-top: 2px; }

    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #canvas-container { position: absolute; inset: 0; }
    #canvas-container canvas { display: block; }

    .hint {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.85); color: var(--primary-dark);
      padding: 6px 16px; border-radius: 18px; font-size: 0.8rem;
      box-shadow: var(--shadow-md); pointer-events: none; z-index: 10; white-space: nowrap;
    }

    /* 食物路径控制 */
    .food-toggle {
      position: absolute; top: 14px; right: 16px; z-index: 11;
      background: #fff; color: var(--primary-dark); border: none;
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
      box-shadow: var(--shadow-md); font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
    }
    .food-toggle:hover { background: #f1f8e9; }
    .food-dot { width: 9px; height: 9px; border-radius: 50%; background: #7CB342; animation: move 1.4s ease-in-out infinite; }
    @keyframes move { 0%,100% { transform: scale(0.7); opacity:0.6; } 50% { transform: scale(1.15); opacity:1; } }

    .info-card {
      position: absolute; top: 56px; right: 16px; width: 290px; max-width: calc(100% - 32px);
      background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg);
      padding: 16px 18px; z-index: 15;
      transform: translateX(120%); transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
      border-top: 4px solid var(--primary);
    }
    .info-card.show { transform: translateX(0); }
    .info-card .ic-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .info-card .ic-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .info-card .ic-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
    .info-card .ic-func { font-size: 0.88rem; color: var(--text-muted); line-height: 1.55; }
    .info-card .ic-close {
      position: absolute; top: 10px; right: 12px;
      width: 24px; height: 24px; line-height: 22px; text-align: center;
      border: none; background: #f1f8e9; color: var(--primary-dark);
      border-radius: 50%; font-size: 1rem; cursor: pointer;
    }
    .info-card .ic-close:hover { background: #dcedc8; }

    .label3d {
      position: absolute; transform: translate(-50%, -120%);
      background: rgba(255,255,255,0.92); color: var(--text-dark);
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); pointer-events: none;
      white-space: nowrap; z-index: 8; border: 1px solid rgba(0,0,0,0.06);
    }

    .legend {
      flex-shrink: 0; background: #fff; border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05); padding: 12px 16px; z-index: 12;
    }
    .legend-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 8px 18px; justify-content: center;
    }
    .legend-title { width: 100%; text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .legend-item:hover { opacity: 0.7; }
    .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }

    @media (max-width: 600px) {
      .title { font-size: 1.2rem; }
      .subtitle { font-size: 0.78rem; }
      .info-card { width: 250px; top: 50px; right: 8px; }
      .food-toggle { font-size: 0.74rem; padding: 6px 12px; right: 8px; }
      .legend-item { font-size: 0.72rem; }
      .hint { font-size: 0.7rem; padding: 5px 12px; }
    }
  </style>

    <link rel="stylesheet" href="../micro-interactions.css?v=1.0">
</head>
<body>
  <header class="header">
    <div class="header-row">
      <a href="../../index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        返回目录
      </a>
      <div class="title-block">
        <div class="title">3D 消化系统全景</div>
        <div class="subtitle">食物路径动画 · 拖拽旋转 · 滚轮缩放 · 点击器官查看功能</div>
      </div>
    </div>
  </header>

  <div class="stage">
    <div class="hint">鼠标拖拽旋转 / 滚轮缩放 / 点击器官或图例查看详情</div>
    <button class="food-toggle" id="foodToggle"><span class="food-dot"></span><span id="foodText">食物运行中</span></button>
    <div id="canvas-container"></div>
    <div class="info-card" id="infoCard">
      <button class="ic-close" id="icClose">&times;</button>
      <div class="ic-head">
        <span class="ic-dot" id="icDot"></span>
        <span class="ic-name" id="icName">名称</span>
      </div>
      <div class="ic-func" id="icFunc">功能说明</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-inner" id="legend">
      <div class="legend-title">器官图例（点击查看名称与功能）</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from '../lib/three/three.module.js';

    // ===== 器官信息 =====
    const PARTS = [
      { id:'mouth',      name:'口腔',   color:'#EC407A', func:'消化道的起点，牙齿切碎、舌搅拌食物，唾液腺分泌唾液初步消化淀粉。' },
      { id:'esophagus',  name:'食道',   color:'#8D6E63', func:'连接咽与胃的管道，通过蠕动将食物团推入胃。' },
      { id:'stomach',    name:'胃',     color:'#E53935', func:'暂时贮存食物，胃腺分泌胃液（含盐酸和胃蛋白酶），初步消化蛋白质。' },
      { id:'small',      name:'小肠',   color:'#FB8C00', func:'消化和吸收的主要场所，很长且有大量绒毛，多种消化液在此完成消化并吸收营养。' },
      { id:'large',      name:'大肠',   color:'#6D4C41', func:'吸收剩余的水分和无机盐，将食物残渣形成粪便并排出。' },
      { id:'liver',      name:'肝脏',   color:'#8E24AA', func:'人体最大的消化腺，分泌胆汁流入小肠，乳化脂肪；并有解毒等功能。' },
      { id:'pancreas',   name:'胰腺',   color:'#FBC02D', func:'分泌胰液含多种消化酶流入小肠，消化糖类、脂肪和蛋白质；还分泌胰岛素。' }
    ];
    function getPart(id){ return PARTS.find(p=>p.id===id); }

    // ===== 渲染基础 =====
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f8e9);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth/Math.max(1,container.clientHeight), 0.1, 1000);
    camera.position.set(0, 0.5, 13);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.72));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(6, 9, 7);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
    fillLight.position.set(-6, -3, -4);
    scene.add(fillLight);

    const digGroup = new THREE.Group();
    scene.add(digGroup);

    const clickableMeshes = [];
    const labelData = [];
    function addLabel(mesh, name, color, offsetVec){ labelData.push({ mesh, name, color, offset: offsetVec.clone() }); }
    const V = (x,y,z)=> new THREE.Vector3(x,y,z);

    // ===== 各消化道中心线 =====
    const ESO_PTS = [ V(0,4.0,0), V(0,3.2,0), V(0,2.5,0), V(0.4,1.95,0) ];
    const STO_PTS = [ V(0.4,1.95,0), V(0.95,1.7,0), V(1.4,1.05,0), V(1.05,0.35,0), V(0.25,0.55,0), V(-0.2,0.65,0) ];
    const SI_PTS  = [ V(-0.2,0.65,0), V(0.35,0.35,0), V(-0.55,-0.05,0), V(0.45,-0.45,0), V(-0.45,-0.85,0),
                      V(0.4,-1.25,0), V(-0.35,-1.65,0), V(0.35,-2.0,0), V(1.0,-2.05,0) ];
    const LI_PTS  = [ V(1.1,-2.05,0), V(1.25,-1.1,0), V(1.25,-0.25,0), V(0.9,0.05,0),
                      V(-0.9,0.05,0), V(-1.25,-0.25,0), V(-1.25,-1.3,0), V(-1.05,-2.0,0), V(-0.3,-2.25,0) ];

    // 构建管道
    function tubeFromPts(pts, radius, color, radial=14){
      const curve = new THREE.CatmullRomCurve3(pts);
      const geo = new THREE.TubeGeometry(curve, Math.max(40, pts.length*12), radius, radial, false);
      const mat = new THREE.MeshStandardMaterial({ color:new THREE.Color(color), roughness:0.5 });
      return new THREE.Mesh(geo, mat);
    }

    // --- 口腔 ---
    const mouth = new THREE.Mesh(new THREE.SphereGeometry(0.55, 28, 22), new THREE.MeshStandardMaterial({ color:0xEC407A, roughness:0.5 }));
    mouth.scale.set(1.1, 0.8, 1.0);
    mouth.position.set(0, 4.3, 0);
    mouth.userData = getPart('mouth');
    digGroup.add(mouth); clickableMeshes.push(mouth);
    addLabel(mouth, '口腔', '#EC407A', new THREE.Vector3(0, 5.0, 0));

    // --- 食道 ---
    const esophagus = tubeFromPts(ESO_PTS, 0.22, '#8D6E63');
    esophagus.userData = getPart('esophagus');
    digGroup.add(esophagus); clickableMeshes.push(esophagus);
    addLabel(esophagus, '食道', '#8D6E63', new THREE.Vector3(0.6, 2.9, 0));

    // --- 胃 ---
    const stomach = tubeFromPts(STO_PTS, 0.42, '#E53935', 18);
    stomach.userData = getPart('stomach');
    digGroup.add(stomach); clickableMeshes.push(stomach);
    addLabel(stomach, '胃', '#E53935', new THREE.Vector3(1.9, 1.1, 0));

    // --- 小肠 ---
    const small = tubeFromPts(SI_PTS, 0.2, '#FB8C00');
    small.userData = getPart('small');
    digGroup.add(small); clickableMeshes.push(small);
    addLabel(small, '小肠', '#FB8C00', new THREE.Vector3(-0.9, -0.4, 0));

    // --- 大肠 ---
    const large = tubeFromPts(LI_PTS, 0.3, '#6D4C41', 18);
    large.userData = getPart('large');
    digGroup.add(large); clickableMeshes.push(large);
    addLabel(large, '大肠', '#6D4C41', new THREE.Vector3(1.7, -1.2, 0));

    // --- 肝脏（右上，分叶） ---
    const liverGroup = new THREE.Group();
    const liverMat = new THREE.MeshStandardMaterial({ color:0x8E24AA, roughness:0.5, transparent:true, opacity:0.92 });
    const lobePositions = [ V(0,0,0), V(0.55,0.1,0), V(0.3,-0.35,0.1), V(-0.2,-0.25,0) ];
    lobePositions.forEach(p=>{
      const lobe = new THREE.Mesh(new THREE.SphereGeometry(0.6, 28, 22), liverMat);
      lobe.scale.set(1.0, 0.7, 0.85);
      lobe.position.copy(p);
      lobe.userData = getPart('liver');
      liverGroup.add(lobe); clickableMeshes.push(lobe);
    });
    liverGroup.position.set(1.7, 2.3, 0);
    liverGroup.rotation.z = -0.35;
    digGroup.add(liverGroup);
    addLabel(liverGroup.children[0], '肝脏', '#8E24AA', new THREE.Vector3(2.7, 3.0, 0));

    // --- 胰腺（胃后方，长条形） ---
    const pancreas = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 18), new THREE.MeshStandardMaterial({ color:0xFBC02D, roughness:0.5 }));
    pancreas.scale.set(1.7, 0.32, 0.5);
    pancreas.position.set(0.35, 1.05, -0.3);
    pancreas.rotation.z = 0.25;
    pancreas.userData = getPart('pancreas');
    digGroup.add(pancreas); clickableMeshes.push(pancreas);
    addLabel(pancreas, '胰腺', '#FBC02D', new THREE.Vector3(-1.0, 1.5, 0));

    // ===== 食物路径（小球沿消化道移动） =====
    const FOOD_PTS = ESO_PTS.concat(STO_PTS).concat(SI_PTS).concat(LI_PTS);
    const foodCurve = new THREE.CatmullRomCurve3(FOOD_PTS);
    foodCurve.arcLengthDivisions = 600;
    const foodBall = new THREE.Mesh(new THREE.SphereGeometry(0.18, 20, 16), new THREE.MeshStandardMaterial({ color:0x7CB342, roughness:0.35, emissive:0x33691E, emissiveIntensity:0.25 }));
    digGroup.add(foodBall);
    // 食物路径辅助光线（淡色）
    const pathGeo = new THREE.TubeGeometry(foodCurve, 400, 0.015, 8, false);
    const pathLine = new THREE.Mesh(pathGeo, new THREE.MeshBasicMaterial({ color:0x8BC34A, transparent:true, opacity:0.25 }));
    digGroup.add(pathLine);

    // 整体居中
    digGroup.position.y = -1.0;

    // ===== 标签 DOM =====
    const labelElements = [];
    labelData.forEach(ld => {
      const el = document.createElement('div');
      el.className = 'label3d'; el.textContent = ld.name;
      el.style.borderLeft = `3px solid ${ld.color}`;
      container.appendChild(el); labelElements.push(el);
    });

    // ===== 图例 =====
    const legendEl = document.getElementById('legend');
    PARTS.forEach(o => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${o.color}"></span>${o.name}`;
      item.addEventListener('click', () => showInfo(o));
      legendEl.appendChild(item);
    });

    // ===== 交互：拖拽旋转 / 滚轮缩放 =====
    const dom = renderer.domElement;
    dom.style.touchAction = 'none';

    let isDragging = false;
    let downX=0, downY=0, prevX=0, prevY=0;
    let targetRotX = 0.1, targetRotY = 0;
    let curRotX = 0.1, curRotY = 0;
    let autoRotate = true, autoTimer = null;

    dom.addEventListener('pointerdown', (e)=>{
      isDragging = true; autoRotate = false; clearTimeout(autoTimer);
      downX = prevX = e.clientX; downY = prevY = e.clientY;
      dom.setPointerCapture(e.pointerId);
    });
    dom.addEventListener('pointerup', (e)=>{
      isDragging = false;
      const moved = Math.abs(e.clientX-downX) + Math.abs(e.clientY-downY);
      if (moved < 6) handleClick(e);
      autoTimer = setTimeout(()=>{ autoRotate = true; }, 2800);
    });
    dom.addEventListener('pointercancel', ()=>{ isDragging = false; });
    dom.addEventListener('pointermove', (e)=>{
      if(!isDragging) return;
      targetRotY += (e.clientX - prevX) * 0.008;
      targetRotX += (e.clientY - prevY) * 0.008;
      targetRotX = Math.max(-1.3, Math.min(1.3, targetRotX));
      prevX = e.clientX; prevY = e.clientY;
    });
    dom.addEventListener('wheel', (e)=>{
      e.preventDefault();
      camera.position.z = Math.max(7, Math.min(22, camera.position.z + e.deltaY * 0.012));
    }, { passive:false });

    // ===== 射线点击 =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function handleClick(e){
      const rect = dom.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
      pointer.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (hits.length > 0 && hits[0].object.userData && hits[0].object.userData.id){
        showInfo(hits[0].object.userData);
      }
    }

    // ===== 信息卡 =====
    const infoCard = document.getElementById('infoCard');
    const icDot = document.getElementById('icDot');
    const icName = document.getElementById('icName');
    const icFunc = document.getElementById('icFunc');
    function showInfo(o){
      if(!o || !o.id) return;
      icDot.style.background = o.color;
      icName.textContent = o.name;
      icFunc.textContent = o.func;
      infoCard.style.borderTopColor = o.color;
      infoCard.classList.add('show');
    }
    document.getElementById('icClose').addEventListener('click', ()=> infoCard.classList.remove('show'));

    // ===== 食物动画开关 =====
    let foodRunning = true;
    const foodToggle = document.getElementById('foodToggle');
    const foodText = document.getElementById('foodText');
    const foodDotEl = document.querySelector('.food-dot');
    foodToggle.addEventListener('click', ()=>{
      foodRunning = !foodRunning;
      foodText.textContent = foodRunning ? '食物运行中' : '已暂停';
      foodDotEl.style.animationPlayState = foodRunning ? 'running' : 'paused';
    });

    // ===== 标签更新 =====
    const tmpVec = new THREE.Vector3();
    function updateLabels(){
      labelData.forEach((ld, i)=>{
        const el = labelElements[i];
        ld.mesh.getWorldPosition(tmpVec);
        tmpVec.add(ld.offset);
        tmpVec.project(camera);
        if (tmpVec.z > 1){ el.style.display='none'; return; }
        const x = (tmpVec.x*0.5+0.5)*container.clientWidth;
        const y = (-tmpVec.y*0.5+0.5)*container.clientHeight;
        el.style.display='block';
        el.style.left = x+'px'; el.style.top = y+'px';
      });
    }

    function onResize(){
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w/Math.max(1,h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ===== 动画循环（食物小球沿消化道移动） =====
    let foodT = 0;
    function animate(){
      requestAnimationFrame(animate);
      if (autoRotate && !isDragging) targetRotY += 0.0022;
      curRotX += (targetRotX - curRotX) * 0.12;
      curRotY += (targetRotY - curRotY) * 0.12;
      digGroup.rotation.x = curRotX;
      digGroup.rotation.y = curRotY;

      if (foodRunning){
        foodT += 0.0016;
        if (foodT > 1) foodT = 0;
        const p = foodCurve.getPointAt(foodT);
        foodBall.position.copy(p);
      }

      updateLabels();
      renderer.render(scene, camera);
    }
    animate();
    onResize();
  </script>

<script src="../focus-mode.js?v=1.0"></script>

<script src="../question-types.js?v=1.0"></script>

<script src="../scroll-narrative.js?v=1.0"></script>
