<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DNA 双螺旋 3D 模型 | 初中生物</title>
  <style>
    :root {
      --primary: #558B2F;
      --primary-light: #8BC34A;
      --primary-dark: #33691E;
      --bg-light: #f1f8e9;
      --text-dark: #1a1a2e;
      --text-muted: #5d6d7e;
      --shadow-md: 0 4px 20px rgba(46,125,50,0.12);
      --shadow-lg: 0 8px 32px rgba(46,125,50,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: #fff; padding: 14px 20px; box-shadow: var(--shadow-md);
      position: relative; z-index: 20; flex-shrink: 0;
    }
    .header-row {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); color: #fff; text-decoration: none;
      padding: 8px 16px; border-radius: 22px; font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.35); backdrop-filter: blur(8px);
      transition: background 0.25s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .back-btn svg { width: 16px; height: 16px; }
    .title-block { flex: 1; min-width: 200px; }
    .title { font-size: 1.45rem; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.18); }
    .subtitle { font-size: 0.85rem; opacity: 0.92; margin-top: 2px; }

    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #canvas-container { position: absolute; inset: 0; }
    #canvas-container canvas { display: block; }

    .hint {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.85); color: var(--primary-dark);
      padding: 6px 16px; border-radius: 18px; font-size: 0.8rem;
      box-shadow: var(--shadow-md); pointer-events: none; z-index: 10; white-space: nowrap;
    }

    .play-toggle {
      position: absolute; top: 14px; right: 16px; z-index: 11;
      background: #fff; color: var(--primary-dark); border: none;
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
      box-shadow: var(--shadow-md); font-weight: 600; display: inline-flex; align-items: center; gap: 7px;
    }
    .play-toggle:hover { background: #f1f8e9; }
    .play-icon { width: 0; height: 0; border-style: solid; }
    .play-icon.play { border-width: 6px 0 6px 10px; border-color: transparent transparent transparent var(--primary-dark); }
    .play-icon.pause { width: 10px; height: 12px; border: none; background: linear-gradient(90deg, var(--primary-dark) 35%, transparent 35%, transparent 65%, var(--primary-dark) 65%); }

    .info-card {
      position: absolute; top: 60px; right: 16px; width: 290px; max-width: calc(100% - 32px);
      background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg);
      padding: 16px 18px; z-index: 15;
      transform: translateX(120%); transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
      border-top: 4px solid var(--primary);
    }
    .info-card.show { transform: translateX(0); }
    .info-card .ic-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .info-card .ic-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .info-card .ic-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
    .info-card .ic-func { font-size: 0.88rem; color: var(--text-muted); line-height: 1.55; }
    .info-card .ic-close {
      position: absolute; top: 10px; right: 12px;
      width: 24px; height: 24px; line-height: 22px; text-align: center;
      border: none; background: #f1f8e9; color: var(--primary-dark);
      border-radius: 50%; font-size: 1rem; cursor: pointer;
    }
    .info-card .ic-close:hover { background: #dcedc8; }

    .label3d {
      position: absolute; transform: translate(-50%, -120%);
      background: rgba(255,255,255,0.92); color: var(--text-dark);
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); pointer-events: none;
      white-space: nowrap; z-index: 8; border: 1px solid rgba(0,0,0,0.06);
    }

    .legend {
      flex-shrink: 0; background: #fff; border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05); padding: 12px 16px; z-index: 12;
    }
    .legend-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 8px 18px; justify-content: center; align-items: center;
    }
    .legend-title { width: 100%; text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
    .legend-group { display: flex; align-items: center; gap: 6px; padding: 0 10px; border-left: 2px solid #e0e0e0; flex-wrap: wrap; justify-content: center; }
    .legend-group:first-of-type { border-left: none; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .legend-item:hover { opacity: 0.7; }
    .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .legend-square { width: 14px; height: 7px; border-radius: 3px; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .legend-group-label { font-size: 0.72rem; color: var(--text-muted); font-weight: 600; }
    .legend-pair { font-size: 0.74rem; color: var(--text-muted); }

    @media (max-width: 600px) {
      .title { font-size: 1.2rem; }
      .subtitle { font-size: 0.78rem; }
      .info-card { width: 250px; top: 52px; right: 8px; }
      .legend-item, .legend-group-label { font-size: 0.72rem; }
      .hint { font-size: 0.7rem; padding: 5px 12px; }
      .play-toggle { font-size: 0.74rem; padding: 6px 12px; right: 8px; }
    }
  </style>

</head>
<body>
  <header class="header">
    <div class="header-row">
      <a href="../../index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        返回目录
      </a>
      <div class="title-block">
        <div class="title">DNA 双螺旋 3D 模型</div>
        <div class="subtitle">两条主链 · 四种碱基 A-T-G-C · 自动旋转 · 可暂停/播放 · 拖拽旋转</div>
      </div>
    </div>
  </header>

  <div class="stage">
    <div class="hint">鼠标拖拽旋转 / 滚轮缩放 / 点击结构查看详情</div>
    <button class="play-toggle" id="playToggle"><span class="play-icon pause" id="playIcon"></span><span id="playText">自动旋转</span></button>
    <div id="canvas-container"></div>
    <div class="info-card" id="infoCard">
      <button class="ic-close" id="icClose">&times;</button>
      <div class="ic-head">
        <span class="ic-dot" id="icDot"></span>
        <span class="ic-name" id="icName">名称</span>
      </div>
      <div class="ic-func" id="icFunc">功能说明</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-inner" id="legend">
      <div class="legend-title">图例：主链颜色 + 碱基颜色与配对（A-T、G-C）</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from '../lib/three/three.module.js';

    // ===== 结构信息定义 =====
    const STRAND1 = { id: 's1', name: '主链 1（脱氧核糖-磷酸骨架）', color: '#1565C0', func: 'DNA 的一条多核苷酸链骨架，由脱氧核糖与磷酸交替连接构成，方向为 5\'→3\'。' };
    const STRAND2 = { id: 's2', name: '主链 2（脱氧核糖-磷酸骨架）', color: '#C62828', func: 'DNA 的另一条多核苷酸链骨架，与主链 1 反向平行（3\'→5\'），共同构成双螺旋。' };
    const BASES = {
      A: { name: '腺嘌呤 (A)', color: '#43A047', pair: 'T', func: '嘌呤类碱基，与胸腺嘧啶(T)通过两个氢键配对（A=T）。' },
      T: { name: '胸腺嘧啶 (T)', color: '#FB8C00', pair: 'A', func: '嘧啶类碱基，与腺嘌呤(A)通过两个氢键配对（A=T）。' },
      G: { name: '鸟嘌呤 (G)', color: '#8E24AA', pair: 'C', func: '嘌呤类碱基，与胞嘧啶(C)通过三个氢键配对（G≡C）。' },
      C: { name: '胞嘧啶 (C)', color: '#00ACC1', pair: 'G', func: '嘧啶类碱基，与鸟嘌呤(G)通过三个氢键配对（G≡C）。' }
    };

    // ===== 渲染基础设置 =====
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f8e9);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / Math.max(1, container.clientHeight), 0.1, 1000);
    camera.position.set(0, 0, 14);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.85);
    keyLight.position.set(6, 9, 6);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.45);
    fillLight.position.set(-6, -3, -5);
    scene.add(fillLight);

    const dnaGroup = new THREE.Group();
    scene.add(dnaGroup);

    const clickableMeshes = [];
    const labelData = [];
    function addLabel(mesh, name, color, offsetVec) {
      labelData.push({ mesh, name, color, offset: offsetVec.clone() });
    }

    // ===== DNA 参数 =====
    const N = 24;                 // 碱基对数量
    const R = 1.7;                // 螺旋半径
    const RISE = 0.62;            // 每个碱基对的垂直升高
    const TWIST = Math.PI / 5;    // 每步旋转 36°（约 10 对/圈）
    const yCenter = (N - 1) * RISE / 2;

    // 第一条链的碱基序列（教学用，固定）
    const seq1 = "ATGCGATTACGCATGCAATTGGCAT".split('').slice(0, N);
    // 互补链
    const complement = { A: 'T', T: 'A', G: 'C', C: 'G' };

    // 计算两条主链的骨架点
    const pts1 = [], pts2 = [];
    for (let i = 0; i < N; i++) {
      const a1 = i * TWIST;
      const a2 = a1 + Math.PI;
      const y = i * RISE - yCenter;
      pts1.push(new THREE.Vector3(R * Math.cos(a1), y, R * Math.sin(a1)));
      pts2.push(new THREE.Vector3(R * Math.cos(a2), y, R * Math.sin(a2)));
    }

    // --- 两条主链（TubeGeometry 平滑管道） ---
    const strand1 = new THREE.Mesh(
      new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts1), 220, 0.16, 12, false),
      new THREE.MeshStandardMaterial({ color: 0x1565C0, roughness: 0.4, metalness: 0.1 })
    );
    strand1.userData = STRAND1;
    dnaGroup.add(strand1);
    clickableMeshes.push(strand1);

    const strand2 = new THREE.Mesh(
      new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts2), 220, 0.16, 12, false),
      new THREE.MeshStandardMaterial({ color: 0xC62828, roughness: 0.4, metalness: 0.1 })
    );
    strand2.userData = STRAND2;
    dnaGroup.add(strand2);
    clickableMeshes.push(strand2);

    addLabel(strand1, '主链 1', '#1565C0', new THREE.Vector3(R, -yCenter - 0.2, 0));
    addLabel(strand2, '主链 2', '#C62828', new THREE.Vector3(-R, -yCenter - 0.2, 0));

    // --- 骨架小球 + 碱基对横杆 ---
    const baseMatCache = {};
    function baseMat(letter) {
      if (!baseMatCache[letter]) {
        baseMatCache[letter] = new THREE.MeshStandardMaterial({ color: new THREE.Color(BASES[letter].color), roughness: 0.45 });
      }
      return baseMatCache[letter];
    }
    const sphGeo = new THREE.SphereGeometry(0.22, 16, 14);

    // 生成两点之间的圆柱
    function makeRung(pA, pB, letter, isHalfFromA) {
      // 半段：从 pA 到中点（碱基 letter），便于用两个颜色分别表示配对的两个碱基
      const mid = new THREE.Vector3().addVectors(pA, pB).multiplyScalar(0.5);
      const dir = new THREE.Vector3().subVectors(mid, pA);
      const len = dir.length();
      const geo = new THREE.CylinderGeometry(0.11, 0.11, len, 10, 1, false);
      const mesh = new THREE.Mesh(geo, baseMat(letter));
      mesh.position.copy(pA).add(mid).multiplyScalar(0.5);
      mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.clone().normalize());
      return mesh;
    }

    const labeledBases = new Set();
    for (let i = 0; i < N; i++) {
      const p1 = pts1[i], p2 = pts2[i];
      const b1 = seq1[i];            // 第一条链的碱基
      const b2 = complement[b1];     // 互补碱基

      // 骨架球
      const s1 = new THREE.Mesh(sphGeo, new THREE.MeshStandardMaterial({ color: 0x1565C0, roughness: 0.4 }));
      s1.position.copy(p1); s1.userData = STRAND1; dnaGroup.add(s1); clickableMeshes.push(s1);
      const s2 = new THREE.Mesh(sphGeo, new THREE.MeshStandardMaterial({ color: 0xC62828, roughness: 0.4 }));
      s2.position.copy(p2); s2.userData = STRAND2; dnaGroup.add(s2); clickableMeshes.push(s2);

      // 两个半段碱基横杆
      const half1 = makeRung(p1, p2, b1, true);
      half1.userData = BASES[b1];
      dnaGroup.add(half1); clickableMeshes.push(half1);

      const half2 = makeRung(p2, p1, b2, false);
      half2.userData = BASES[b2];
      dnaGroup.add(half2); clickableMeshes.push(half2);

      // 给每种碱基第一次出现时加一个标签
      if (!labeledBases.has(b1)) {
        labeledBases.add(b1);
        addLabel(half1, b1, BASES[b1].color, new THREE.Vector3(0, 0, 0));
      }
      if (!labeledBases.has(b2)) {
        labeledBases.add(b2);
        addLabel(half2, b2, BASES[b2].color, new THREE.Vector3(0, 0, 0));
      }
    }

    // ===== 标签 DOM =====
    const labelElements = [];
    labelData.forEach(ld => {
      const el = document.createElement('div');
      el.className = 'label3d';
      el.textContent = ld.name;
      el.style.borderLeft = `3px solid ${ld.color}`;
      container.appendChild(el);
      labelElements.push(el);
    });

    // ===== 图例 =====
    const legendEl = document.getElementById('legend');
    // 主链组
    const strandGroup = document.createElement('div');
    strandGroup.className = 'legend-group';
    let sl = document.createElement('span'); sl.className = 'legend-group-label'; sl.textContent = '主链：'; strandGroup.appendChild(sl);
    [STRAND1, STRAND2].forEach(o => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-square" style="background:${o.color}"></span>${o.id === 's1' ? '主链 1（蓝）' : '主链 2（红）'}`;
      item.addEventListener('click', () => showInfo(o));
      strandGroup.appendChild(item);
    });
    legendEl.appendChild(strandGroup);
    // 碱基组
    const baseGroup = document.createElement('div');
    baseGroup.className = 'legend-group';
    let bl = document.createElement('span'); bl.className = 'legend-group-label'; bl.textContent = '碱基：'; baseGroup.appendChild(bl);
    ['A', 'T', 'G', 'C'].forEach(k => {
      const o = BASES[k];
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${o.color}"></span>${o.name}`;
      item.addEventListener('click', () => showInfo(o));
      baseGroup.appendChild(item);
    });
    legendEl.appendChild(baseGroup);
    // 配对规则
    const pairGroup = document.createElement('div');
    pairGroup.className = 'legend-group';
    let pl = document.createElement('span'); pl.className = 'legend-group-label'; pl.textContent = '配对：'; pairGroup.appendChild(pl);
    const pair1 = document.createElement('span'); pair1.className = 'legend-pair'; pair1.textContent = 'A = T（2 个氢键）';
    const pair2 = document.createElement('span'); pair2.className = 'legend-pair'; pair2.textContent = 'G ≡ C（3 个氢键）';
    pairGroup.appendChild(pair1); pairGroup.appendChild(pair2);
    legendEl.appendChild(pairGroup);

    // ===== 交互 =====
    const dom = renderer.domElement;
    dom.style.touchAction = 'none';

    let isDragging = false;
    let downX = 0, downY = 0, prevX = 0, prevY = 0;
    let targetRotX = 0, targetRotY = 0;
    let curRotX = 0, curRotY = 0;
    let autoRotate = true;
    let autoTimer = null;

    dom.addEventListener('pointerdown', (e) => {
      isDragging = true; autoRotate = false; clearTimeout(autoTimer);
      downX = prevX = e.clientX; downY = prevY = e.clientY;
      dom.setPointerCapture(e.pointerId);
    });
    dom.addEventListener('pointerup', (e) => {
      isDragging = false;
      const moved = Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY);
      if (moved < 6) handleClick(e);
      autoTimer = setTimeout(() => { autoRotate = true; }, 2500);
    });
    dom.addEventListener('pointercancel', () => { isDragging = false; });
    dom.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      targetRotY += (e.clientX - prevX) * 0.008;
      targetRotX += (e.clientY - prevY) * 0.008;
      targetRotX = Math.max(-1.3, Math.min(1.3, targetRotX));
      prevX = e.clientX; prevY = e.clientY;
    });
    dom.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.position.z = Math.max(7, Math.min(26, camera.position.z + e.deltaY * 0.012));
    }, { passive: false });

    // ===== 射线点击 =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function handleClick(e) {
      const rect = dom.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (hits.length > 0) showInfo(hits[0].object.userData);
    }

    // ===== 信息卡 =====
    const infoCard = document.getElementById('infoCard');
    const icDot = document.getElementById('icDot');
    const icName = document.getElementById('icName');
    const icFunc = document.getElementById('icFunc');
    function showInfo(o) {
      if (!o || !o.name) return;
      icDot.style.background = o.color;
      icName.textContent = o.name;
      icFunc.textContent = o.func;
      infoCard.style.borderTopColor = o.color;
      infoCard.classList.add('show');
    }
    document.getElementById('icClose').addEventListener('click', () => infoCard.classList.remove('show'));

    // ===== 暂停/播放 =====
    const playToggle = document.getElementById('playToggle');
    const playIcon = document.getElementById('playIcon');
    const playText = document.getElementById('playText');
    playToggle.addEventListener('click', () => {
      autoRotate = !autoRotate;
      if (autoRotate) {
        playIcon.className = 'play-icon pause';
        playText.textContent = '自动旋转';
      } else {
        playIcon.className = 'play-icon play';
        playText.textContent = '已暂停';
      }
    });

    // ===== 标签更新 =====
    const tmpVec = new THREE.Vector3();
    function updateLabels() {
      labelData.forEach((ld, i) => {
        const el = labelElements[i];
        ld.mesh.getWorldPosition(tmpVec);
        tmpVec.add(ld.offset);
        tmpVec.project(camera);
        if (tmpVec.z > 1) { el.style.display = 'none'; return; }
        const x = (tmpVec.x * 0.5 + 0.5) * container.clientWidth;
        const y = (-tmpVec.y * 0.5 + 0.5) * container.clientHeight;
        el.style.display = 'block';
        el.style.left = x + 'px'; el.style.top = y + 'px';
      });
    }

    function onResize() {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w / Math.max(1, h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ===== 动画循环 =====
    function animate() {
      requestAnimationFrame(animate);
      if (autoRotate && !isDragging) targetRotY += 0.006;
      curRotX += (targetRotX - curRotX) * 0.12;
      curRotY += (targetRotY - curRotY) * 0.12;
      dnaGroup.rotation.x = curRotX;
      dnaGroup.rotation.y = curRotY;
      updateLabels();
      renderer.render(scene, camera);
    }
    animate();
    onResize();
  </script>

<script src="../focus-mode.js?v=1.0"></script>

<script src="../question-types.js?v=1.0"></script>
</body>
