<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D 人体呼吸系统 | 初中生物</title>
  <style>
    :root {
      --primary: #558B2F;
      --primary-light: #8BC34A;
      --primary-dark: #33691E;
      --bg-light: #f1f8e9;
      --text-dark: #1a1a2e;
      --text-muted: #5d6d7e;
      --shadow-md: 0 4px 20px rgba(46,125,50,0.12);
      --shadow-lg: 0 8px 32px rgba(46,125,50,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: #fff; padding: 14px 20px; box-shadow: var(--shadow-md);
      position: relative; z-index: 20; flex-shrink: 0;
    }
    .header-row {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); color: #fff; text-decoration: none;
      padding: 8px 16px; border-radius: 22px; font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.35); backdrop-filter: blur(8px);
      transition: background 0.25s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .back-btn svg { width: 16px; height: 16px; }
    .title-block { flex: 1; min-width: 200px; }
    .title { font-size: 1.45rem; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.18); }
    .subtitle { font-size: 0.85rem; opacity: 0.92; margin-top: 2px; }

    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #canvas-container { position: absolute; inset: 0; }
    #canvas-container canvas { display: block; }

    .hint {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.85); color: var(--primary-dark);
      padding: 6px 16px; border-radius: 18px; font-size: 0.8rem;
      box-shadow: var(--shadow-md); pointer-events: none; z-index: 10; white-space: nowrap;
    }

    /* 呼吸控制 */
    .breath-toggle {
      position: absolute; top: 14px; right: 16px; z-index: 11;
      background: #fff; color: var(--primary-dark); border: none;
      padding: 7px 16px; border-radius: 20px; font-size: 0.82rem; cursor: pointer;
      box-shadow: var(--shadow-md); font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
    }
    .breath-toggle:hover { background: #f1f8e9; }
    .breath-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--primary); animation: blink 3s ease-in-out infinite; }
    @keyframes blink { 0%,100% { transform: scale(0.6); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } }

    /* 呼吸状态指示 */
    .phase-tag {
      position: absolute; top: 56px; right: 16px; z-index: 11;
      background: rgba(255,255,255,0.92); color: var(--primary-dark);
      padding: 6px 14px; border-radius: 16px; font-size: 0.8rem; font-weight: 600;
      box-shadow: var(--shadow-md);
    }

    .info-card {
      position: absolute; top: 92px; right: 16px; width: 290px; max-width: calc(100% - 32px);
      background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg);
      padding: 16px 18px; z-index: 15;
      transform: translateX(120%); transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
      border-top: 4px solid var(--primary);
    }
    .info-card.show { transform: translateX(0); }
    .info-card .ic-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .info-card .ic-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .info-card .ic-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
    .info-card .ic-func { font-size: 0.88rem; color: var(--text-muted); line-height: 1.55; }
    .info-card .ic-close {
      position: absolute; top: 10px; right: 12px;
      width: 24px; height: 24px; line-height: 22px; text-align: center;
      border: none; background: #f1f8e9; color: var(--primary-dark);
      border-radius: 50%; font-size: 1rem; cursor: pointer;
    }
    .info-card .ic-close:hover { background: #dcedc8; }

    .label3d {
      position: absolute; transform: translate(-50%, -120%);
      background: rgba(255,255,255,0.92); color: var(--text-dark);
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); pointer-events: none;
      white-space: nowrap; z-index: 8; border: 1px solid rgba(0,0,0,0.06);
    }

    .legend {
      flex-shrink: 0; background: #fff; border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05); padding: 12px 16px; z-index: 12;
    }
    .legend-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 8px 18px; justify-content: center;
    }
    .legend-title { width: 100%; text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.8rem; cursor: pointer; transition: opacity 0.2s; }
    .legend-item:hover { opacity: 0.7; }
    .legend-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }

    @media (max-width: 600px) {
      .title { font-size: 1.2rem; }
      .subtitle { font-size: 0.78rem; }
      .info-card { width: 250px; top: 86px; right: 8px; }
      .phase-tag { right: 8px; font-size: 0.74rem; padding: 5px 10px; }
      .breath-toggle { font-size: 0.74rem; padding: 6px 12px; right: 8px; }
      .legend-item { font-size: 0.72rem; }
      .hint { font-size: 0.7rem; padding: 5px 12px; }
    }
  </style>

</head>
<body>
  <header class="header">
    <div class="header-row">
      <a href="../../index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        返回目录
      </a>
      <div class="title-block">
        <div class="title">3D 人体呼吸系统</div>
        <div class="subtitle">肺部呼吸动画 · 拖拽旋转 · 点击结构查看名称与功能</div>
      </div>
    </div>
  </header>

  <div class="stage">
    <div class="hint">鼠标拖拽旋转 / 滚轮缩放 / 点击结构查看详情</div>
    <button class="breath-toggle" id="breathToggle"><span class="breath-dot"></span><span id="breathText">呼吸中</span></button>
    <div class="phase-tag" id="phaseTag">吸气</div>
    <div id="canvas-container"></div>
    <div class="info-card" id="infoCard">
      <button class="ic-close" id="icClose">&times;</button>
      <div class="ic-head">
        <span class="ic-dot" id="icDot"></span>
        <span class="ic-name" id="icName">名称</span>
      </div>
      <div class="ic-func" id="icFunc">功能说明</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-inner" id="legend">
      <div class="legend-title">结构图例（点击查看名称与功能）</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from '../lib/three/three.module.js';

    // ===== 结构信息 =====
    const PARTS = [
      { id:'nose',     name:'鼻腔',   color:'#FFB300', func:'空气进入呼吸道的起点，鼻毛和黏膜可过滤、温暖、湿润吸入的空气。' },
      { id:'pharynx',  name:'咽',     color:'#8D6E63', func:'气体与食物的共同通道，空气由此进入喉。' },
      { id:'larynx',   name:'喉',     color:'#A1887F', func:'呼吸通道，内含声带，是发声器官。' },
      { id:'trachea',  name:'气管',   color:'#26A69A', func:'以“C”形软骨作支架，保持气体通畅，黏膜纤毛可排出灰尘和黏液。' },
      { id:'bronchus', name:'支气管', color:'#43A047', func:'气管下端分出的左右支气管，分别通入左右肺，分支成支气管树。' },
      { id:'lungL',    name:'左肺',   color:'#EF5350', func:'位于左胸腔，分为两叶，是气体交换的主要场所（略小，为心脏留位）。' },
      { id:'lungR',    name:'右肺',   color:'#E53935', func:'位于右胸腔，分为三叶，体积略大，是气体交换的主要场所。' }
    ];
    function getPart(id){ return PARTS.find(p=>p.id===id); }

    // ===== 渲染基础 =====
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f8e9);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth/Math.max(1,container.clientHeight), 0.1, 1000);
    camera.position.set(0, 0, 13);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.72));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.9);
    keyLight.position.set(6, 9, 6);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.42);
    fillLight.position.set(-6, -3, -5);
    scene.add(fillLight);

    const bodyGroup = new THREE.Group();
    scene.add(bodyGroup);

    const clickableMeshes = [];
    const labelData = [];
    const breathingMeshes = []; // { mesh, base:Vector3 } 受呼吸缩放影响
    function addLabel(mesh, name, color, offsetVec){ labelData.push({ mesh, name, color, offset: offsetVec.clone() }); }

    // --- 鼻腔（顶部） ---
    const nose = new THREE.Mesh(new THREE.SphereGeometry(0.55, 28, 22), new THREE.MeshStandardMaterial({ color:0xFFB300, roughness:0.5 }));
    nose.scale.set(1.0, 0.8, 1.1);
    nose.position.set(0, 4.2, 0.2);
    nose.userData = getPart('nose');
    bodyGroup.add(nose); clickableMeshes.push(nose);
    addLabel(nose, '鼻腔', '#FFB300', new THREE.Vector3(0, 4.9, 0.2));

    // --- 咽（短管） ---
    const pharynx = new THREE.Mesh(new THREE.CylinderGeometry(0.32, 0.36, 0.9, 22), new THREE.MeshStandardMaterial({ color:0x8D6E63, roughness:0.55 }));
    pharynx.position.set(0, 3.2, 0.15);
    pharynx.userData = getPart('pharynx');
    bodyGroup.add(pharynx); clickableMeshes.push(pharynx);
    addLabel(pharynx, '咽', '#8D6E63', new THREE.Vector3(0.6, 3.2, 0.15));

    // --- 喉 ---
    const larynx = new THREE.Mesh(new THREE.SphereGeometry(0.45, 26, 20), new THREE.MeshStandardMaterial({ color:0xA1887F, roughness:0.5 }));
    larynx.scale.set(1, 0.9, 1);
    larynx.position.set(0, 2.3, 0.1);
    larynx.userData = getPart('larynx');
    bodyGroup.add(larynx); clickableMeshes.push(larynx);
    addLabel(larynx, '喉', '#A1887F', new THREE.Vector3(0.6, 2.3, 0.1));

    // --- 气管（带 C 形软骨环） ---
    const tracheaGroup = new THREE.Group();
    const tracheaTube = new THREE.Mesh(new THREE.CylinderGeometry(0.34, 0.34, 2.4, 24), new THREE.MeshStandardMaterial({ color:0x26A69A, roughness:0.5, transparent:true, opacity:0.9 }));
    tracheaTube.position.set(0, 0.6, 0);
    tracheaTube.userData = getPart('trachea');
    tracheaGroup.add(tracheaTube); clickableMeshes.push(tracheaTube);
    // 软骨环
    const ringMat = new THREE.MeshStandardMaterial({ color:0x80CBC4, roughness:0.4 });
    for (let i = 0; i < 7; i++){
      const ring = new THREE.Mesh(new THREE.TorusGeometry(0.34, 0.05, 10, 24), ringMat);
      ring.rotation.x = Math.PI/2;
      ring.position.set(0, 1.7 - i*0.33, 0);
      ring.userData = getPart('trachea');
      tracheaGroup.add(ring); clickableMeshes.push(ring);
    }
    tracheaGroup.position.set(0, 0, 0);
    bodyGroup.add(tracheaGroup);
    addLabel(tracheaTube, '气管', '#26A69A', new THREE.Vector3(0.7, 1.3, 0));

    // --- 支气管（左右分叉） ---
    function makeBronchus(side){ // side: -1 左, +1 右
      const curve = new THREE.CatmullRomCurve3([
        new THREE.Vector3(0, -0.6, 0),
        new THREE.Vector3(side*0.5, -0.95, 0),
        new THREE.Vector3(side*1.0, -1.3, 0)
      ]);
      const mesh = new THREE.Mesh(new THREE.TubeGeometry(curve, 30, 0.22, 14, false), new THREE.MeshStandardMaterial({ color:0x43A047, roughness:0.5 }));
      mesh.userData = getPart('bronchus');
      bodyGroup.add(mesh); clickableMeshes.push(mesh);
      return mesh;
    }
    const bronchusL = makeBronchus(-1);
    const bronchusR = makeBronchus(1);
    addLabel(bronchusL, '支气管', '#43A047', new THREE.Vector3(-1.4, -1.4, 0));

    // --- 肺（左右） ---
    function makeLung(side, colorHex, partId, name, lobeCount){
      const lungGroup = new THREE.Group();
      const lungMat = new THREE.MeshStandardMaterial({ color:new THREE.Color(colorHex), roughness:0.55, transparent:true, opacity:0.92 });
      // 主体（椭球，尖端朝上）
      const lung = new THREE.Mesh(new THREE.SphereGeometry(1.55, 40, 32), lungMat);
      lung.scale.set(side===0?1:0.85, 1.45, 0.85);
      lung.userData = getPart(partId);
      lungGroup.add(lung); clickableMeshes.push(lung);
      // 叶间裂（用细圆环表示分叶）
      const fissureMat = new THREE.MeshStandardMaterial({ color:0xB71C1C, roughness:0.6, transparent:true, opacity:0.35 });
      for (let i = 0; i < lobeCount - 1; i++){
        const f = new THREE.Mesh(new THREE.TorusGeometry(1.45, 0.03, 8, 30), fissureMat);
        f.scale.set(0.85, 1.0, 0.85);
        f.rotation.y = Math.PI/2;
        f.rotation.x = 0.3 + i*0.25;
        f.position.y = 0.2 - i*0.7;
        lungGroup.add(f);
      }
      // 顶端（肺尖）小帽
      const apex = new THREE.Mesh(new THREE.SphereGeometry(0.5, 20, 16), lungMat);
      apex.scale.set(0.85, 0.6, 0.85);
      apex.position.y = 1.9;
      apex.userData = getPart(partId);
      lungGroup.add(apex); clickableMeshes.push(apex);

      lungGroup.position.set(side*1.55, -1.7, 0);
      lungGroup.rotation.z = side > 0 ? -0.12 : 0.12;
      bodyGroup.add(lungGroup);
      breathingMeshes.push({ mesh: lungGroup, base: lungGroup.scale.clone() });
      addLabel(lung, name, colorHex, new THREE.Vector3(side*1.55, 0.2, 0));
      return lungGroup;
    }
    makeLung(-1, '#EF5350', 'lungL', '左肺', 2); // 左肺 2 叶
    makeLung(1,  '#E53935', 'lungR', '右肺', 3); // 右肺 3 叶

    // 整体居中微调
    bodyGroup.position.y = 0.4;

    // ===== 标签 DOM =====
    const labelElements = [];
    labelData.forEach(ld => {
      const el = document.createElement('div');
      el.className = 'label3d'; el.textContent = ld.name;
      el.style.borderLeft = `3px solid ${ld.color}`;
      container.appendChild(el); labelElements.push(el);
    });

    // ===== 图例 =====
    const legendEl = document.getElementById('legend');
    PARTS.forEach(o => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${o.color}"></span>${o.name}`;
      item.addEventListener('click', () => showInfo(o));
      legendEl.appendChild(item);
    });

    // ===== 交互：拖拽旋转 / 滚轮缩放 =====
    const dom = renderer.domElement;
    dom.style.touchAction = 'none';

    let isDragging = false;
    let downX=0, downY=0, prevX=0, prevY=0;
    let targetRotX = 0.1, targetRotY = 0;
    let curRotX = 0.1, curRotY = 0;
    let autoRotate = true, autoTimer = null;

    dom.addEventListener('pointerdown', (e)=>{
      isDragging = true; autoRotate = false; clearTimeout(autoTimer);
      downX = prevX = e.clientX; downY = prevY = e.clientY;
      dom.setPointerCapture(e.pointerId);
    });
    dom.addEventListener('pointerup', (e)=>{
      isDragging = false;
      const moved = Math.abs(e.clientX-downX) + Math.abs(e.clientY-downY);
      if (moved < 6) handleClick(e);
      autoTimer = setTimeout(()=>{ autoRotate = true; }, 2800);
    });
    dom.addEventListener('pointercancel', ()=>{ isDragging = false; });
    dom.addEventListener('pointermove', (e)=>{
      if(!isDragging) return;
      targetRotY += (e.clientX - prevX) * 0.008;
      targetRotX += (e.clientY - prevY) * 0.008;
      targetRotX = Math.max(-1.3, Math.min(1.3, targetRotX));
      prevX = e.clientX; prevY = e.clientY;
    });
    dom.addEventListener('wheel', (e)=>{
      e.preventDefault();
      camera.position.z = Math.max(7, Math.min(22, camera.position.z + e.deltaY * 0.012));
    }, { passive:false });

    // ===== 射线点击 =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function handleClick(e){
      const rect = dom.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left)/rect.width)*2 - 1;
      pointer.y = -((e.clientY - rect.top)/rect.height)*2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (hits.length > 0 && hits[0].object.userData){
        showInfo(hits[0].object.userData);
      }
    }

    // ===== 信息卡 =====
    const infoCard = document.getElementById('infoCard');
    const icDot = document.getElementById('icDot');
    const icName = document.getElementById('icName');
    const icFunc = document.getElementById('icFunc');
    function showInfo(o){
      if(!o || !o.id) return;
      icDot.style.background = o.color;
      icName.textContent = o.name;
      icFunc.textContent = o.func;
      infoCard.style.borderTopColor = o.color;
      infoCard.classList.add('show');
    }
    document.getElementById('icClose').addEventListener('click', ()=> infoCard.classList.remove('show'));

    // ===== 呼吸动画开关 =====
    let breathing = true;
    const breathToggle = document.getElementById('breathToggle');
    const breathText = document.getElementById('breathText');
    const breathDot = document.querySelector('.breath-dot');
    breathToggle.addEventListener('click', ()=>{
      breathing = !breathing;
      breathText.textContent = breathing ? '呼吸中' : '已暂停';
      breathDot.style.animationPlayState = breathing ? 'running' : 'paused';
    });

    // ===== 标签更新 =====
    const tmpVec = new THREE.Vector3();
    function updateLabels(){
      labelData.forEach((ld, i)=>{
        const el = labelElements[i];
        ld.mesh.getWorldPosition(tmpVec);
        tmpVec.add(ld.offset);
        tmpVec.project(camera);
        if (tmpVec.z > 1){ el.style.display='none'; return; }
        const x = (tmpVec.x*0.5+0.5)*container.clientWidth;
        const y = (-tmpVec.y*0.5+0.5)*container.clientHeight;
        el.style.display='block';
        el.style.left = x+'px'; el.style.top = y+'px';
      });
    }

    function onResize(){
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w/Math.max(1,h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ===== 动画循环（呼吸：膨胀-收缩） =====
    const phaseTag = document.getElementById('phaseTag');
    let breathTime = 0;
    function animate(){
      requestAnimationFrame(animate);
      if (autoRotate && !isDragging) targetRotY += 0.0022;
      curRotX += (targetRotX - curRotX) * 0.12;
      curRotY += (targetRotY - curRotY) * 0.12;
      bodyGroup.rotation.x = curRotX;
      bodyGroup.rotation.y = curRotY;

      // 呼吸：周期约 4 秒，sin 控制吸气(膨胀)/呼气(收缩)
      let scale = 1;
      if (breathing){
        breathTime += 0.015;
        // 0~1：吸气；1~2：呼气
        const s = (Math.sin(breathTime) + 1) * 0.5; // 0..1
        scale = 1 + (s - 0.5) * 0.16; // 0.92 .. 1.08
        phaseTag.textContent = (Math.sin(breathTime) >= 0) ? '吸气（肺部膨胀）' : '呼气（肺部收缩）';
        phaseTag.style.color = (Math.sin(breathTime) >= 0) ? '#2E7D32' : '#1565C0';
      } else {
        phaseTag.textContent = '已暂停';
        phaseTag.style.color = '#5d6d7e';
      }
      breathingMeshes.forEach(b => {
        b.mesh.scale.set(b.base.x * scale, b.base.y * scale, b.base.z * scale);
      });

      updateLabels();
      renderer.render(scene, camera);
    }
    animate();
    onResize();
  </script>

<script src="../focus-mode.js?v=1.0"></script>

<script src="../question-types.js?v=1.0"></script>
</body>
