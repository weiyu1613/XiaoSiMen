<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>动物细胞 3D 模型 | 初中生物</title>
  <style>
    :root {
      --primary: #558B2F;
      --primary-light: #8BC34A;
      --primary-dark: #33691E;
      --bg-light: #f1f8e9;
      --text-dark: #1a1a2e;
      --text-muted: #5d6d7e;
      --shadow-md: 0 4px 20px rgba(46,125,50,0.12);
      --shadow-lg: 0 8px 32px rgba(46,125,50,0.18);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .header {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
      color: #fff;
      padding: 14px 20px;
      box-shadow: var(--shadow-md);
      position: relative;
      z-index: 20;
      flex-shrink: 0;
    }
    .header-row {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.18); color: #fff; text-decoration: none;
      padding: 8px 16px; border-radius: 22px; font-size: 0.9rem;
      border: 1px solid rgba(255,255,255,0.35); backdrop-filter: blur(8px);
      transition: background 0.25s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(255,255,255,0.32); }
    .back-btn svg { width: 16px; height: 16px; }
    .title-block { flex: 1; min-width: 200px; }
    .title { font-size: 1.45rem; font-weight: 700; text-shadow: 1px 1px 3px rgba(0,0,0,0.18); }
    .subtitle { font-size: 0.85rem; opacity: 0.92; margin-top: 2px; }

    .stage { flex: 1; position: relative; overflow: hidden; min-height: 0; }
    #canvas-container { position: absolute; inset: 0; }
    #canvas-container canvas { display: block; }

    .hint {
      position: absolute; top: 14px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.85); color: var(--primary-dark);
      padding: 6px 16px; border-radius: 18px; font-size: 0.8rem;
      box-shadow: var(--shadow-md); pointer-events: none; z-index: 10; white-space: nowrap;
    }

    .info-card {
      position: absolute; top: 60px; right: 16px; width: 280px; max-width: calc(100% - 32px);
      background: #fff; border-radius: 14px; box-shadow: var(--shadow-lg);
      padding: 16px 18px; z-index: 15;
      transform: translateX(120%); transition: transform 0.35s cubic-bezier(.2,.8,.2,1);
      border-top: 4px solid var(--primary);
    }
    .info-card.show { transform: translateX(0); }
    .info-card .ic-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .info-card .ic-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
    .info-card .ic-name { font-size: 1.1rem; font-weight: 700; color: var(--primary-dark); }
    .info-card .ic-func { font-size: 0.9rem; color: var(--text-muted); line-height: 1.55; }
    .info-card .ic-close {
      position: absolute; top: 10px; right: 12px;
      width: 24px; height: 24px; line-height: 22px; text-align: center;
      border: none; background: #f1f8e9; color: var(--primary-dark);
      border-radius: 50%; font-size: 1rem; cursor: pointer;
    }
    .info-card .ic-close:hover { background: #dcedc8; }

    .label3d {
      position: absolute; transform: translate(-50%, -120%);
      background: rgba(255,255,255,0.92); color: var(--text-dark);
      font-size: 0.72rem; padding: 2px 8px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15); pointer-events: none;
      white-space: nowrap; z-index: 8; border: 1px solid rgba(0,0,0,0.06);
    }

    .legend {
      flex-shrink: 0; background: #fff; border-top: 1px solid #e0e0e0;
      box-shadow: 0 -2px 12px rgba(0,0,0,0.05); padding: 12px 16px; z-index: 12;
    }
    .legend-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; flex-wrap: wrap; gap: 10px 20px; justify-content: center;
    }
    .legend-title { width: 100%; text-align: center; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 2px; font-weight: 600; }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; cursor: pointer; transition: opacity 0.2s; }
    .legend-item:hover { opacity: 0.7; }
    .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }

    @media (max-width: 600px) {
      .title { font-size: 1.2rem; }
      .subtitle { font-size: 0.78rem; }
      .info-card { width: 250px; top: 52px; right: 8px; }
      .legend-item { font-size: 0.76rem; }
      .hint { font-size: 0.72rem; padding: 5px 12px; }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-row">
      <a href="../../index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        返回目录
      </a>
      <div class="title-block">
        <div class="title">动物细胞 3D 模型</div>
        <div class="subtitle">拖拽旋转 · 滚轮缩放 · 点击细胞器查看名称与功能</div>
      </div>
    </div>
  </header>

  <div class="stage">
    <div class="hint">鼠标拖拽旋转 / 滚轮缩放 / 点击结构查看详情</div>
    <div id="canvas-container"></div>
    <div class="info-card" id="infoCard">
      <button class="ic-close" id="icClose">&times;</button>
      <div class="ic-head">
        <span class="ic-dot" id="icDot"></span>
        <span class="ic-name" id="icName">名称</span>
      </div>
      <div class="ic-func" id="icFunc">功能说明</div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-inner" id="legend">
      <div class="legend-title">结构图例（颜色对照）</div>
    </div>
  </div>

  <script type="module">
    import * as THREE from '../lib/three/three.module.js';

    // ===== 细胞器信息定义（动物细胞：无细胞壁、无叶绿体、无大液泡） =====
    const ORGANELLES = [
      { id: 'membrane', name: '细胞膜', color: '#FFB300', func: '包在细胞表面，控制物质进出细胞，保持细胞内部环境相对稳定。' },
      { id: 'nucleus', name: '细胞核', color: '#8E24AA', func: '含有遗传物质 DNA，是细胞遗传信息和代谢活动的控制中心。' },
      { id: 'mitochondria', name: '线粒体', color: '#FB8C00', func: '细胞呼吸作用的主要场所，为细胞生命活动提供能量（动力车间）。' },
      { id: 'er', name: '内质网', color: '#E53935', func: '由膜构成的网状管道系统，参与蛋白质等物质的合成与运输。' },
      { id: 'golgi', name: '高尔基体', color: '#00ACC1', func: '对蛋白质进行加工、分类和包装，参与细胞分泌物的形成与运输。' },
      { id: 'lysosome', name: '溶酶体', color: '#FFCA28', func: '内含多种水解酶，能分解衰老的细胞器或吞入的颗粒，是细胞的“消化车间”。' }
    ];

    // ===== 渲染基础设置 =====
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf1f8e9);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / Math.max(1, container.clientHeight), 0.1, 1000);
    camera.position.set(0, 0, 13);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.75));
    const keyLight = new THREE.DirectionalLight(0xffffff, 0.85);
    keyLight.position.set(6, 9, 6);
    scene.add(keyLight);
    const fillLight = new THREE.DirectionalLight(0xffffff, 0.4);
    fillLight.position.set(-6, -4, -5);
    scene.add(fillLight);

    const cellGroup = new THREE.Group();
    scene.add(cellGroup);

    const clickableMeshes = [];
    const labelData = [];
    function addLabel(mesh, name, color, offsetVec) {
      labelData.push({ mesh, name, color, offset: offsetVec.clone() });
    }

    // --- 细胞膜（外层薄膜，动物细胞最外层） ---
    const membraneGeo = new THREE.SphereGeometry(4.5, 48, 36);
    const membraneMat = new THREE.MeshPhysicalMaterial({
      color: 0xFFB300, transparent: true, opacity: 0.16, roughness: 0.4,
      side: THREE.DoubleSide, clearcoat: 0.3
    });
    const membrane = new THREE.Mesh(membraneGeo, membraneMat);
    membrane.scale.set(1.12, 1, 1.04);
    membrane.userData = ORGANELLES[0];
    cellGroup.add(membrane);
    clickableMeshes.push(membrane);
    addLabel(membrane, '细胞膜', '#FFB300', new THREE.Vector3(0, 4.8, 0));

    // --- 细胞核（紫色球体，居中偏左） ---
    const nucleusGroup = new THREE.Group();
    const nucleus = new THREE.Mesh(
      new THREE.SphereGeometry(1.3, 40, 32),
      new THREE.MeshStandardMaterial({ color: 0x8E24AA, roughness: 0.45, metalness: 0.05 })
    );
    nucleusGroup.add(nucleus);
    const nucleolus = new THREE.Mesh(
      new THREE.SphereGeometry(0.45, 24, 20),
      new THREE.MeshStandardMaterial({ color: 0x6A1B9A, roughness: 0.4 })
    );
    nucleolus.position.set(0.3, 0.2, 0.3);
    nucleusGroup.add(nucleolus);
    nucleusGroup.position.set(-1.6, 0.8, 1.2);
    nucleus.userData = ORGANELLES[1];
    cellGroup.add(nucleusGroup);
    clickableMeshes.push(nucleus);
    addLabel(nucleus, '细胞核', '#8E24AA', new THREE.Vector3(-1.6, 2.3, 1.2));

    // --- 线粒体（橙色椭球体，多个） ---
    const mitoPositions = [
      new THREE.Vector3(2.4, 1.8, 0.8),
      new THREE.Vector3(2.0, -1.6, 1.2),
      new THREE.Vector3(-2.6, -1.8, 0.6),
      new THREE.Vector3(0.2, 2.6, -1.4)
    ];
    mitoPositions.forEach((p, i) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.5, 24, 18),
        new THREE.MeshStandardMaterial({ color: 0xFB8C00, roughness: 0.45 })
      );
      mesh.scale.set(1.7, 0.7, 0.7);
      mesh.position.copy(p);
      mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
      mesh.userData = ORGANELLES[2];
      cellGroup.add(mesh);
      clickableMeshes.push(mesh);
      if (i === 0) addLabel(mesh, '线粒体', '#FB8C00', new THREE.Vector3(p.x, p.y + 0.8, p.z));
    });

    // --- 内质网（红色弯曲管道） ---
    const erCurve = new THREE.CatmullRomCurve3([
      new THREE.Vector3(1.8, 2.0, -1.0),
      new THREE.Vector3(3.0, 0.5, -0.3),
      new THREE.Vector3(2.6, -1.0, 0.6),
      new THREE.Vector3(1.0, -1.8, 1.2),
      new THREE.Vector3(-0.4, -1.2, 1.6),
      new THREE.Vector3(-1.2, 0.0, 1.2)
    ]);
    const er = new THREE.Mesh(
      new THREE.TubeGeometry(erCurve, 80, 0.16, 10, false),
      new THREE.MeshStandardMaterial({ color: 0xE53935, roughness: 0.5 })
    );
    er.userData = ORGANELLES[3];
    cellGroup.add(er);
    clickableMeshes.push(er);
    addLabel(er, '内质网', '#E53935', new THREE.Vector3(3.0, 1.2, -0.2));

    // --- 高尔基体（青色，由堆叠的扁平囊组成） ---
    const golgiGroup = new THREE.Group();
    const golgiMat = new THREE.MeshStandardMaterial({ color: 0x00ACC1, roughness: 0.4 });
    for (let i = 0; i < 5; i++) {
      const disc = new THREE.Mesh(
        new THREE.CylinderGeometry(0.9 - i * 0.08, 0.9 - i * 0.08, 0.12, 32, 1, false),
        golgiMat
      );
      disc.rotation.x = Math.PI / 2;
      disc.position.y = i * 0.28 - 0.56;
      disc.scale.set(1, 1, 0.45); // 压扁成椭圆囊
      golgiGroup.add(disc);
    }
    golgiGroup.position.set(-2.4, 1.6, -0.8);
    golgiGroup.rotation.set(0.3, 0.5, 0.2);
    golgiGroup.userData = ORGANELLES[4];
    cellGroup.add(golgiGroup);
    // 让整个高尔基体可点击（用第一个子网格代表）
    golgiGroup.children.forEach(c => { c.userData = ORGANELLES[4]; clickableMeshes.push(c); });
    addLabel(golgiGroup.children[0], '高尔基体', '#00ACC1', new THREE.Vector3(0, 1.1, 0));

    // --- 溶酶体（琥珀色小球，多个） ---
    const lysoPositions = [
      new THREE.Vector3(1.0, -2.4, -0.6),
      new THREE.Vector3(-2.9, 0.2, 1.0),
      new THREE.Vector3(2.8, -0.4, -1.6)
    ];
    lysoPositions.forEach((p, i) => {
      const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(0.34, 22, 18),
        new THREE.MeshStandardMaterial({ color: 0xFFCA28, roughness: 0.4 })
      );
      mesh.position.copy(p);
      mesh.userData = ORGANELLES[5];
      cellGroup.add(mesh);
      clickableMeshes.push(mesh);
      if (i === 0) addLabel(mesh, '溶酶体', '#FFCA28', new THREE.Vector3(p.x, p.y + 0.7, p.z));
    });

    // ===== 标签 DOM =====
    const labelElements = [];
    labelData.forEach(ld => {
      const el = document.createElement('div');
      el.className = 'label3d';
      el.textContent = ld.name;
      el.style.borderLeft = `3px solid ${ld.color}`;
      container.appendChild(el);
      labelElements.push(el);
    });

    // ===== 图例 =====
    const legendEl = document.getElementById('legend');
    ORGANELLES.forEach(o => {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<span class="legend-dot" style="background:${o.color}"></span>${o.name}`;
      item.addEventListener('click', () => showInfo(o));
      legendEl.appendChild(item);
    });

    // ===== 交互 =====
    const dom = renderer.domElement;
    dom.style.touchAction = 'none';

    let isDragging = false;
    let downX = 0, downY = 0, prevX = 0, prevY = 0;
    let targetRotX = 0.2, targetRotY = 0;
    let curRotX = 0.2, curRotY = 0;
    let autoRotate = true;
    let autoTimer = null;

    dom.addEventListener('pointerdown', (e) => {
      isDragging = true; autoRotate = false; clearTimeout(autoTimer);
      downX = prevX = e.clientX; downY = prevY = e.clientY;
      dom.setPointerCapture(e.pointerId);
    });
    dom.addEventListener('pointerup', (e) => {
      isDragging = false;
      const moved = Math.abs(e.clientX - downX) + Math.abs(e.clientY - downY);
      if (moved < 6) handleClick(e);
      autoTimer = setTimeout(() => { autoRotate = true; }, 2500);
    });
    dom.addEventListener('pointercancel', () => { isDragging = false; });
    dom.addEventListener('pointermove', (e) => {
      if (!isDragging) return;
      targetRotY += (e.clientX - prevX) * 0.008;
      targetRotX += (e.clientY - prevY) * 0.008;
      targetRotX = Math.max(-1.4, Math.min(1.4, targetRotX));
      prevX = e.clientX; prevY = e.clientY;
    });
    dom.addEventListener('wheel', (e) => {
      e.preventDefault();
      camera.position.z = Math.max(6, Math.min(24, camera.position.z + e.deltaY * 0.012));
    }, { passive: false });

    // ===== 射线点击 =====
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    function handleClick(e) {
      const rect = dom.getBoundingClientRect();
      pointer.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(clickableMeshes, false);
      if (hits.length > 0) showInfo(hits[0].object.userData);
    }

    // ===== 信息卡 =====
    const infoCard = document.getElementById('infoCard');
    const icDot = document.getElementById('icDot');
    const icName = document.getElementById('icName');
    const icFunc = document.getElementById('icFunc');
    function showInfo(o) {
      if (!o) return;
      icDot.style.background = o.color;
      icName.textContent = o.name;
      icFunc.textContent = o.func;
      infoCard.style.borderTopColor = o.color;
      infoCard.classList.add('show');
    }
    document.getElementById('icClose').addEventListener('click', () => infoCard.classList.remove('show'));

    // ===== 标签更新 =====
    const tmpVec = new THREE.Vector3();
    function updateLabels() {
      labelData.forEach((ld, i) => {
        const el = labelElements[i];
        ld.mesh.getWorldPosition(tmpVec);
        tmpVec.add(ld.offset);
        tmpVec.project(camera);
        if (tmpVec.z > 1) { el.style.display = 'none'; return; }
        const x = (tmpVec.x * 0.5 + 0.5) * container.clientWidth;
        const y = (-tmpVec.y * 0.5 + 0.5) * container.clientHeight;
        el.style.display = 'block';
        el.style.left = x + 'px'; el.style.top = y + 'px';
      });
    }

    function onResize() {
      const w = container.clientWidth, h = container.clientHeight;
      camera.aspect = w / Math.max(1, h);
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
    }
    window.addEventListener('resize', onResize);

    // ===== 动画循环 =====
    function animate() {
      requestAnimationFrame(animate);
      if (autoRotate && !isDragging) targetRotY += 0.0025;
      curRotX += (targetRotX - curRotX) * 0.12;
      curRotY += (targetRotY - curRotY) * 0.12;
      cellGroup.rotation.x = curRotX;
      cellGroup.rotation.y = curRotY;
      cellGroup.children.forEach(c => {
        if (c.userData && (c.userData.id === 'mitochondria' || c.userData.id === 'lysosome')) {
          c.rotation.z += 0.012;
        }
      });
      updateLabels();
      renderer.render(scene, camera);
    }
    animate();
    onResize();
  </script>
</body>
</html>
