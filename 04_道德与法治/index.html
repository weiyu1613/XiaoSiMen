  <style>
    body { margin:0; font-family:'Microsoft YaHei',sans-serif; background:#0a0e1a; color:#e8eaf0; display:flex; justify-content:center; align-items:center; min-height:100vh; }
    .card { text-align:center; padding:40px; }
    .card h1 { font-size:2rem; margin-bottom:20px; }
    .card a { display:inline-block; margin:8px; padding:12px 28px; background:rgba(255,255,255,0.08); color:#e8eaf0; text-decoration:none; border-radius:8px; border:1px solid rgba(255,255,255,0.1); transition:all 0.3s; }
    .card a:hover { background:rgba(255,255,255,0.15); transform:translateY(-2px); }
    .back { position:fixed; top:20px; left:20px; color:#8892a8; text-decoration:none; }
  
    /* ====== 吉祥物系统CSS（独立版） ====== */
    .mascot-container {
      position: fixed; bottom: 20px; right: 20px; z-index: 90;
      display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
      opacity: 0; transform: translateY(20px) scale(0.8);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer;
    }
    .mascot-container.mascot-loaded { opacity: 1; transform: translateY(0) scale(1); }
    .mascot-container:hover { transform: translateY(-4px) scale(1.05); }
    .mascot-dialogue {
      background: rgba(255,255,255,0.95); border: 2px solid var(--mascot-color, #8B4513);
      border-radius: 16px 16px 4px 16px; padding: 10px 16px; font-size: 13px; font-weight: 500;
      max-width: 220px; color: #2c3e50; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
      opacity: 0; transform: translateY(8px) scale(0.9); transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none; position: relative;
    }
    .mascot-dialogue::after {
      content: ''; position: absolute; bottom: -8px; right: 20px; width: 0; height: 0;
      border-left: 8px solid transparent; border-right: 8px solid transparent;
      border-top: 8px solid var(--mascot-color, #8B4513);
    }
    .mascot-dialogue.show { opacity: 1; transform: translateY(0) scale(1); }
    .mascot-svg-wrapper { position: relative; width: 64px; height: 64px; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); }
    .mascot-svg { width: 100%; height: 100%; transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot-container:hover .mascot-svg { transform: scale(1.1) rotate(-5deg); }
    .mascot-level-badge {
      position: absolute; top: -4px; right: -4px;
      background: linear-gradient(135deg, var(--mascot-accent, #D4A574), var(--mascot-color, #8B4513));
      color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2); border: 1.5px solid white; z-index: 1;
    }
    .mascot-state-happy .mascot-svg { animation: mascotBounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .mascot-state-excited .mascot-svg { animation: mascotShake 0.4s ease-in-out 3; }
    .mascot-state-confused .mascot-svg { animation: mascotTilt 0.5s ease; }
    .mascot-state-celebrate .mascot-svg { animation: mascotJump 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 2; }
    .mascot-state-proud .mascot-svg { animation: mascotGlow 1s ease-in-out; }
    .mascot-state-thinking .mascot-svg { animation: mascotThink 2s ease-in-out; }
    @keyframes mascotBounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes mascotShake { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-8deg); } 75% { transform: rotate(8deg); } }
    @keyframes mascotTilt { 0%,100% { transform: rotate(0); } 50% { transform: rotate(-5deg); } }
    @keyframes mascotJump { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-16px) scale(1.1); } }
    @keyframes mascotGlow { 0%,100% { filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15)); } 50% { filter: drop-shadow(0 0 16px var(--mascot-accent)) drop-shadow(0 4px 8px rgba(0,0,0,0.15)); } }
    @keyframes mascotThink { 0%,100% { transform: rotate(0); } 50% { transform: rotate(3deg) translateY(-2px); } }
    .mascot-tooltip {
      position: fixed; background: rgba(0,0,0,0.85); color: white; padding: 5px 12px;
      border-radius: 6px; font-size: 12px; font-weight: 500; transform: translateX(-50%);
      z-index: 1000; pointer-events: none;
    }

  
    .back-home {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.2); color: white; text-decoration: none;
      padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; margin-top: 16px;
      backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
      transition: all 0.2s;
    }
    .back-home:hover { background: rgba(255,255,255,0.3); transform: translateX(-4px); }
    
  </style>
