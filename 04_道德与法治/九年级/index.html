<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初中9年级道法 - 课件首页 | TeachAny</title>
  <link rel="stylesheet" href="shared/styles.css?v=8.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #7B1FA2;
      --primary-light: #AB47BC;
      --primary-dark: #4A148C;
      --bg-light: #faf5ff;
      --bg-card: #ffffff;
      --text-dark: #1a1a2e;
      --text-muted: #6c7293;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 20px rgba(0,0,0,0.1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg-light); color: var(--text-dark); line-height: 1.6;
    }
    .hero-section {
      background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-light) 100%);
      color: white; padding: 48px 20px; text-align: center;
    }
    .hero-icon { font-size: 48px; margin-bottom: 16px; }
    .hero-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 8px; }
    .hero-subtitle { font-size: 1rem; opacity: 0.9; }
    .back-home {
      position: fixed; top: 20px; left: 20px; z-index: 1000;
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--primary, #555); color: white; text-decoration: none;
      padding: 8px 20px; border-radius: 20px; font-size: 0.9rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      transition: all 0.2s;
    }
    .back-home:hover { filter: brightness(1.15); transform: translateX(-4px); }
    .main-content { max-width: 900px; margin: 0 auto; padding: 32px 20px; }
    .section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; color: var(--primary-dark); }
    .lesson-card {
      display: flex; align-items: center; gap: 16px; background: var(--bg-card);
      padding: 20px 24px; border-radius: 12px; margin-bottom: 12px;
      text-decoration: none; color: var(--text-dark);
      box-shadow: var(--shadow-sm); transition: all 0.3s;
      border: 1px solid rgba(0,0,0,0.04);
    }
    .lesson-card:hover { box-shadow: var(--shadow-md); transform: translateX(4px); border-color: var(--primary-light); }
    .lesson-icon { width: 48px; height: 48px; background: var(--primary); color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .lesson-title { flex: 1; font-weight: 600; font-size: 1.05rem; }
    .lesson-arrow { color: var(--primary-light); font-size: 14px; }
  </style>
</head>
<body>
  <section class="hero-section">
    <div class="hero-icon"><i class="fa-solid fa-scale-balanced"></i></div>
    <h1 class="hero-title">初中9年级道法</h1>
    <p class="hero-subtitle">正义守护者 · 冲刺中考</p>
    <a href="../../index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> 返回主页</a>
  </section>
  <div class="main-content">
    <h2 class="section-title"><i class="fa-solid fa-list-ul"></i> 单元目录</h2>
    <p style="color:var(--text-muted);text-align:center;padding:40px;">课件制作中...</p>
  </div>
  <script src="shared/mascot.js?v=8.0"></script>
  <script src="shared/badges.js?v=8.0"></script>
</body>
</html>
