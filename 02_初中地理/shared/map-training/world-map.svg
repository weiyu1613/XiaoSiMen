<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <!-- 背景：海洋 -->
  <rect width="800" height="450" fill="#E3F2FD"/>
  
  <!-- 经纬网（参考线） -->
  <g stroke="#BBDEFB" stroke-width="1" fill="none">
    <line x1="0" y1="112" x2="800" y2="112"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="338" x2="800" y2="338"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
  </g>
  
  <!-- 赤道 -->
  <line x1="0" y1="260" x2="800" y2="260" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="780" y="255" font-size="11" fill="#64B5F6" text-anchor="end">赤道</text>
  
  <!-- 亚洲 -->
  <path d="M 380 90 Q 470 70 560 95 L 620 110 Q 690 130 710 180 L 700 230 Q 660 250 620 245 L 560 235 Q 520 250 480 240 L 440 220 Q 400 210 390 180 L 380 140 Z"
        fill="#A5D6A7" stroke="#66BB6A" stroke-width="2"/>
  <text x="540" y="160" font-size="18" font-weight="bold" fill="#2E7D32" text-anchor="middle">亚洲</text>
  
  <!-- 非洲 -->
  <path d="M 400 250 Q 420 245 450 250 L 475 265 Q 485 295 480 330 L 465 365 Q 445 385 425 375 L 410 350 Q 395 320 395 290 Z"
        fill="#FFE0B2" stroke="#FFB74D" stroke-width="2"/>
  <text x="440" y="315" font-size="16" font-weight="bold" fill="#E65100" text-anchor="middle">非洲</text>
  
  <!-- 欧洲 -->
  <path d="M 360 110 Q 390 95 420 100 L 440 115 Q 445 140 425 150 L 395 155 Q 370 150 360 135 Z"
        fill="#B3E5FC" stroke="#4FC3F7" stroke-width="2"/>
  <text x="400" y="130" font-size="13" font-weight="bold" fill="#01579B" text-anchor="middle">欧洲</text>
  
  <!-- 北美洲 -->
  <path d="M 90 100 Q 150 80 210 95 L 240 120 Q 250 160 235 195 L 210 215 Q 170 225 140 215 L 110 195 Q 85 165 85 135 Z"
        fill="#C5CAE9" stroke="#7986CB" stroke-width="2"/>
  <text x="165" y="160" font-size="14" font-weight="bold" fill="#1A237E" text-anchor="middle">北美洲</text>
  
  <!-- 南美洲 -->
  <path d="M 200 250 Q 225 240 245 255 L 255 290 Q 250 330 235 360 L 215 385 Q 195 390 185 370 L 175 335 Q 170 300 180 275 Z"
        fill="#F8BBD0" stroke="#F48FB1" stroke-width="2"/>
  <text x="215" y="320" font-size="13" font-weight="bold" fill="#880E4F" text-anchor="middle">南美洲</text>
  
  <!-- 大洋洲 -->
  <path d="M 620 320 Q 660 310 695 325 L 705 345 Q 690 360 660 360 L 630 355 Q 615 345 615 330 Z"
        fill="#D7CCC8" stroke="#A1887F" stroke-width="2"/>
  <text x="660" y="345" font-size="12" font-weight="bold" fill="#3E2723" text-anchor="middle">大洋洲</text>
  
  <!-- 南极洲（简化条带） -->
  <path d="M 50 410 Q 400 395 750 410 L 750 440 L 50 440 Z"
        fill="#ECEFF1" stroke="#B0BEC5" stroke-width="2"/>
  <text x="400" y="428" font-size="12" font-weight="bold" fill="#455A64" text-anchor="middle">南极洲</text>
  
  <!-- 标题 -->
  <text x="400" y="30" font-size="20" font-weight="bold" fill="#1565C0" text-anchor="middle">世界大洲分布图</text>
</svg>
