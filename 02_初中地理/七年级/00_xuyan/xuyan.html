      <h2 class="section-title"><span class="num">🌍</span> 什么是地理</h2>
      <div class="card">
        <p>地理是研究地球表面的地理环境以及人类活动与地理环境关系的科学。它包含自然地理和人文地理两大分支。</p>
      </div>
    </div>
    <div class="section">
      <h2 class="section-title"><span class="num">📋</span> 为什么要学地理</h2>
      <div class="card">
        <p>学习地理可以帮助我们了解自然规律，认识人类活动与地理环境的关系，培养全球视野和可持续发展意识。</p>
      </div>
    </div>
    <div class="section">
      <h2 class="section-title"><span class="num">✏️</span> 怎样学好地理</h2>
      <div class="card">
        <p>1. 善于观察生活中的地理现象<br>2. 学会读图、用图<br>3. 理论联系实际<br>4. 关注时事热点中的地理问题</p>
      </div>
