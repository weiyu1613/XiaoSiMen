  <style>
    :root {
      --primary: #3498db;
      --primary-light: #5dade2;
      --primary-dark: #1a5276;
      --secondary: #85c1e9;
      --bg-light: #f0f8ff;
      --bg-card: #ffffff;
      --text-dark: #1a1a2e;
      --text-muted: #5d6d7e;
      --shadow-sm: 0 2px 8px rgba(52, 152, 219, 0.08);
      --shadow-md: 0 4px 20px rgba(52, 152, 219, 0.12);
      --shadow-lg: 0 8px 32px rgba(52, 152, 219, 0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
    }

    /* ====== Hero Section ====== */
    .hero-section {
      background: linear-gradient(135deg, #1a5276 0%, var(--primary) 30%, var(--primary-light) 70%, #2e86c1 100%);
      color: white;
      padding: 60px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }

    .hero-content { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

    .hero-icon { font-size: 64px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .hero-title {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 3px;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      opacity: 0.95;
      margin-bottom: 24px;
    }

    /* 关键知识点 */
    .key-points {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 24px 0;
      position: relative;
      flex-wrap: wrap;
    }

    .key-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
      min-width: 120px;
    }

    .key-point-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .key-point-label {
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.9;
    }

    /* 进度条 */
    .progress-container {
      max-width: 600px;
      margin: 24px auto 0;
      text-align: left;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .progress-track {
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #f0e68c, #ffd700, #ff8c00);
      border-radius: 4px;
      transition: width 1s ease;
      box-shadow: 0 0 12px rgba(255, 215, 0, 0.5);
    }

    /* ====== Main Content ====== */
    .main-content { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

    /* 章节标题 */
    .section-title {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .section-icon {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 22px;
      box-shadow: var(--shadow-md);
    }

    .section-text h2 {
      font-size: 1.5rem;
      color: var(--primary);
      font-weight: 700;
    }

    .section-text p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ====== Lessons Grid ====== */
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .lesson-card {
      background: var(--bg-card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      border: 1px solid rgba(52, 152, 219, 0.08);
      position: relative;
    }

    .lesson-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), var(--primary-light), var(--secondary));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .lesson-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-lg);
      border-color: transparent;
    }

    .lesson-card:hover::before { transform: scaleX(1); }

    .card-header {
      padding: 20px 20px 12px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .lesson-num {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 4px 12px rgba(52,152,219,0.25);
    }

    .lesson-meta { flex: 1; }

    .lesson-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .lesson-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .status-完成 {
      background: linear-gradient(135deg, #d1fae5, #a7f3d0);
      color: #065f46;
    }

    .card-body {
      padding: 0 20px 16px;
    }

    .lesson-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card-footer {
      padding: 16px 20px;
      background: var(--bg-light);
      border-top: 1px solid rgba(52,152,219,0.06);
    }

    .lesson-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 20px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .lesson-link:hover {
      background: linear-gradient(135deg, var(--primary-dark), var(--primary));
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(52,152,219,0.35);

    /* ====== Navigation ====== */
    .nav-bar {
      background: white;
      padding: 12px 20px;
      box-shadow: var(--shadow-sm);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .nav-btn {
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-dark);
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-btn:hover {
      background: var(--bg-light);
      color: var(--primary);
    }

    .nav-center {
      flex: 1;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
    }

    /* ====== Footer ====== */
    .footer {
      background: var(--text-dark);
      color: white;
      padding: 32px 20px;
      text-align: center;
      margin-top: 48px;

    /* ====== Responsive ====== */

      .hero-subtitle { font-size: 0.9rem; }
      
      .key-points { gap: 12px; }
      .key-point { padding: 12px; min-width: 100px; }
      .key-point-icon { width: 38px; height: 38px; font-size: 18px; }
      .key-point-label { font-size: 0.75rem; }

      .lessons-grid { grid-template-columns: 1fr; }
    }
  </style>
