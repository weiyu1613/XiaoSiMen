<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>中国行政区划互动地图</title>
<style>
  :root{
    --primary:#1565C0; --primary-light:#42A5F5; --primary-dark:#0D47A1;
    --accent:#00BCD4; --bg:#e8f4fd; --text:#2c3e50; --white:#f0f8ff;
    --card-bg:rgba(240,248,255,0.97); --border:#90caf9; --shadow:0 6px 24px rgba(13,71,161,0.18);
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans SC',-apple-system,"Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden;
  }
  .topbar{
    position:fixed;top:0;left:0;right:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary) 55%,var(--primary-light));
    color:#fff;box-shadow:var(--shadow);
  }
  .topbar h1{font-size:20px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:10px;}
  .topbar h1 .logo{font-size:24px;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,0.16);color:#fff;text-decoration:none;
    padding:8px 16px;border-radius:30px;font-size:14px;font-weight:500;
    border:1px solid rgba(255,255,255,0.35);transition:all .25s;
  }
  .back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-2px);}
  /* 主体布局 */
  .main{position:fixed;top:58px;left:0;right:0;bottom:0;display:flex;}
  .map-area{flex:1;position:relative;overflow:hidden;background:linear-gradient(160deg,#dcefff,#cfe8fd);}
  #map{width:100%;height:100%;display:block;touch-action:none;}
  /* 省份样式 */
  .province{cursor:pointer;transition:filter .15s;}
  .province polygon{fill:#bbdefb;stroke:#1565C0;stroke-width:1.2;transition:fill .15s,stroke .15s;}
  .province:hover polygon{fill:#64b5f6;}
  .province.selected polygon{fill:#1565C0;stroke:#0D47A1;stroke-width:2;}
  .province.placed polygon{fill:#1565C0;stroke:#0D47A1;}
  .province.placed text{fill:#fff;}
  .province text{fill:#0D47A1;font-size:11px;font-weight:600;pointer-events:none;text-anchor:middle;dominant-baseline:central;}
  .province.locked{cursor:default;}
  .province.locked polygon{fill:#1565C0;}
  /* 海洋背景圆 */
  .ocean-bg{fill:url(#oceanGrad);}
  /* 侧栏 */
  .sidebar{
    width:330px;flex:none;background:var(--card-bg);border-left:1px solid var(--border);
    box-shadow:-4px 0 18px rgba(13,71,161,0.08);display:flex;flex-direction:column;overflow:hidden;
  }
  .mode-bar{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:8px;}
  .btn{
    border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
    padding:8px 14px;border-radius:30px;transition:all .2s;flex:1;
    background:#fff;color:var(--primary);border:1.5px solid var(--primary);
  }
  .btn:hover{background:var(--bg);}
  .btn.active{background:var(--primary);color:#fff;}
  .btn.solid{background:var(--primary);color:#fff;border-color:var(--primary);}
  .side-content{flex:1;overflow-y:auto;padding:16px;}
  .side-content h3{font-size:15px;color:var(--primary-dark);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
  /* 信息卡 */
  .info-card{display:none;}
  .info-card.show{display:block;}
  .info-card .ic-name{font-size:26px;font-weight:700;color:var(--primary-dark);display:flex;align-items:baseline;gap:10px;}
  .info-card .ic-abbr{font-size:16px;color:#fff;background:var(--primary);padding:2px 10px;border-radius:20px;}
  .info-card .ic-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed #d6e4f7;font-size:14px;}
  .info-card .ic-row span:first-child{color:var(--text);opacity:.75;}
  .info-card .ic-row span:last-child{font-weight:600;color:var(--primary-dark);}
  .ic-hint{font-size:13px;color:var(--text);opacity:.75;line-height:1.7;margin-top:8px;}
  /* 拼图状态 */
  .puzzle-panel{display:none;}
  .puzzle-panel.show{display:block;}
  .progress{background:#e3eefb;border-radius:20px;height:14px;overflow:hidden;margin:8px 0 14px;}
  .progress > div{height:100%;background:linear-gradient(90deg,var(--primary-light),var(--primary));transition:width .3s;}
  .puzzle-stat{font-size:14px;margin:6px 0;}
  .puzzle-stat b{color:var(--primary-dark);font-size:18px;}
  .puzzle-tips{font-size:12.5px;line-height:1.7;color:var(--text);opacity:.85;margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;}
  /* 图例 */
  .legend{padding:12px 16px;border-top:1px solid var(--border);font-size:12px;}
  .legend .row{display:flex;align-items:center;gap:8px;margin:4px 0;}
  .lg{width:18px;height:12px;border-radius:3px;border:1px solid #90caf9;}
  @media (max-width:760px){
    .sidebar{width:240px;}
    .province text{font-size:9px;}
  }
</style>

  <header class="topbar">
    <h1><span class="logo">🇨🇳</span>中国行政区划互动地图</h1>

  <div class="main">
    <div class="map-area">

          <div id="ic-detail" style="display:none">
            <div class="ic-name"><span id="ic-name"></span><span class="ic-abbr" id="ic-abbr"></span></div>
            <div style="margin-top:10px">
              <div class="ic-row"><span>省会城市</span><span id="ic-capital"></span></div>
              <div class="ic-row"><span>面积（万平方千米）</span><span id="ic-area"></span></div>
              <div class="ic-row"><span>人口（万人）</span><span id="ic-pop"></span></div>

            </div>
          </div>
        </div>

        <!-- 拼图游戏面板 -->
        <div class="puzzle-panel" id="puzzle-panel">

          <button class="btn solid" id="btn-shuffle" style="width:100%;margin-top:6px">🔀 重新打乱</button>

          <div class="puzzle-tips">
            <b>玩法：</b>下方托盘中散落着各省份碎片，请将它们拖回地图上对应的正确位置。<br>
            · 拖动碎片移动，靠近正确位置会自动吸附。<br>
            · 已归位的碎片变为深蓝色锁定。<br>
            · 可旋转/缩放地图查看。
          </div>
        </div>
      </div>

      <div class="legend">
        <div class="row"><span class="lg" style="background:#bbdefb"></span>省份（学习模式）</div>

        <div class="row"><span class="lg" style="background:#1565C0"></span>已选中 / 已归位</div>
      </div>
    </aside>
  </div>

  {id:'GX',name:'广西',abbr:'桂',capital:'南宁',area:'23.6',pop:'5013',region:'华南地区',pts:[[470,542],[566,546],[566,616],[478,616]]},

  {id:'GZ',name:'贵州',abbr:'贵/黔',capital:'贵阳',area:'17.6',pop:'3856',region:'西南地区',pts:[[400,470],[470,470],[470,544],[402,544]]},
  {id:'YN',name:'云南',abbr:'云/滇',capital:'昆明',area:'39.4',pop:'4693',region:'西南地区',pts:[[300,470],[400,470],[406,562],[312,572]]},
];

/* ============ 构建 SVG 省份 ============ */
const svg = document.getElementById('map');
const root = document.getElementById('map-root');
const provEls = {};

function centroid(pts){
  let cx=0, cy=0;
  pts.forEach(p=>{cx+=p[0];cy+=p[1];});
  return [cx/pts.length, cy/pts.length];
}

PROVINCES.forEach(p=>{
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.classList.add('province');
  g.dataset.id = p.id;
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points', p.pts.map(pt=>pt.join(',')).join(' '));
  g.appendChild(poly);
  const [cx,cy] = centroid(p.pts);
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', cx); txt.setAttribute('y', cy);
  txt.textContent = p.name;
  g.appendChild(txt);
  root.appendChild(g);
  provEls[p.id] = { el:g, data:p, cx, cy };
});

document.getElementById('total-count').textContent = PROVINCES.length;

/* ============ 模式管理 ============ */
let mode = 'learn'; // 'learn' | 'puzzle'
const modeLearn = document.getElementById('mode-learn');
const modePuzzle = document.getElementById('mode-puzzle');
const infoCard = document.getElementById('info-card');
const puzzlePanel = document.getElementById('puzzle-panel');
const tray = document.getElementById('tray');
const trayLabel = document.getElementById('tray-label');

function setMode(m){
  mode = m;
  modeLearn.classList.toggle('active', m==='learn');
  modePuzzle.classList.toggle('active', m==='puzzle');
  infoCard.classList.toggle('show', m==='learn');
  puzzlePanel.classList.toggle('show', m==='puzzle');
  tray.style.display = m==='puzzle' ? '' : 'none';
  trayLabel.style.display = m==='puzzle' ? '' : 'none';
  // 清除选中
  Object.values(provEls).forEach(o=>o.el.classList.remove('selected'));
  if(m==='puzzle'){ startPuzzle(); }
  else { resetPuzzle(); }
}
modeLearn.addEventListener('click',()=>setMode('learn'));
modePuzzle.addEventListener('click',()=>setMode('puzzle'));

/* ============ 学习模式：悬停 + 点击信息 ============ */
let selectedId = null;
function showInfo(p){
  document.getElementById('ic-default').style.display='none';
  document.getElementById('ic-detail').style.display='block';
  document.getElementById('ic-name').textContent = p.name;
  document.getElementById('ic-abbr').textContent = p.abbr;
  document.getElementById('ic-capital').textContent = p.capital;
  document.getElementById('ic-area').textContent = p.area;
  document.getElementById('ic-pop').textContent = p.pop;
  document.getElementById('ic-region').textContent = p.region;
}
Object.values(provEls).forEach(o=>{
  o.el.addEventListener('click',()=>{
    if(mode!=='learn') return;
    Object.values(provEls).forEach(x=>x.el.classList.remove('selected'));
    o.el.classList.add('selected');
    selectedId = o.data.id;
    showInfo(o.data);
  });
});

/* ============ 拼图游戏 ============ */
const SNAP_DIST = 28; // 吸附距离（SVG 单位）
let placedSet = new Set();

function startPuzzle(){
  placedSet.clear();
  Object.values(provEls).forEach(o=>{
    o.el.classList.remove('placed','locked','selected');
    // 随机打乱到托盘区
    const tx = 20 + Math.random()*820;
    const ty = 820 + Math.random()*180;
    o.el.setAttribute('transform', `translate(${tx - o.cx},${ty - o.cy})`);
    o.el.dataset.tx = (tx - o.cx);
    o.el.dataset.ty = (ty - o.cy);
  });
  updatePuzzleStat();
  document.getElementById('puzzle-result').style.display='none';
}
function resetPuzzle(){
  Object.values(provEls).forEach(o=>{
    o.el.removeAttribute('transform');
    o.el.classList.remove('placed','locked','selected');
  });
  placedSet.clear();
}
document.getElementById('btn-shuffle').addEventListener('click',()=>{ if(mode==='puzzle') startPuzzle(); });

function updatePuzzleStat(){
  document.getElementById('placed-count').textContent = placedSet.size;
  const pct = placedSet.size/PROVINCES.length*100;
  document.getElementById('progress-bar').style.width = pct+'%';
  if(placedSet.size===PROVINCES.length){
    document.getElementById('puzzle-result').style.display='block';
  } else {
    document.getElementById('puzzle-result').style.display='none';
  }
}

/* 提示：把一个未归位省份闪一下并显示其目标位置轮廓 */
document.getElementById('btn-hint').addEventListener('click',()=>{
  if(mode!=='puzzle') return;
  const remaining = PROVINCES.filter(p=>!placedSet.has(p.id));
  if(remaining.length===0) return;
  const p = remaining[Math.floor(Math.random()*remaining.length)];
  const o = provEls[p.id];
  o.el.animate([
    {filter:'none'},{filter:'drop-shadow(0 0 8px #e74c3c) brightness(1.4)'},{filter:'none'}
  ],{duration:1200,iterations:2});
});

/* ============ 拖拽实现 ============ */
let active = null;     // 当前拖动的省份对象
let startSvg = null;   // 拖动起点 SVG 坐标
let startTx=0, startTy=0;

function svgPoint(e){
  const pt = svg.createSVGPoint();
  pt.x = e.clientX; pt.y = e.clientY;
  return pt.matrixTransform(svg.getScreenCTM().inverse());
}

Object.values(provEls).forEach(o=>{
  o.el.addEventListener('pointerdown', e=>{
    if(mode!=='puzzle') return;
    if(o.el.classList.contains('locked')) return;
    e.preventDefault();
    active = o;
    const p = svgPoint(e);
    startSvg = p;
    startTx = parseFloat(o.el.dataset.tx||0);
    startTy = parseFloat(o.el.dataset.ty||0);
    o.el.parentElement.appendChild(o.el); // 置顶
    try { o.el.setPointerCapture(e.pointerId); } catch(_){}
  });
});

svg.addEventListener('pointermove', e=>{
  if(!active) return;
  const p = svgPoint(e);
  const dx = p.x - startSvg.x;
  const dy = p.y - startSvg.y;
  const tx = startTx + dx;
  const ty = startTy + dy;
  active.el.setAttribute('transform', `translate(${tx},${ty})`);
  active.el.dataset.tx = tx;
  active.el.dataset.ty = ty;
});

function endDrag(){
  if(!active) return;
  const o = active;
  const tx = parseFloat(o.el.dataset.tx||0);
  const ty = parseFloat(o.el.dataset.ty||0);
  const dist = Math.hypot(tx, ty); // 距离正确位置(0,0)
  if(dist < SNAP_DIST){
    o.el.setAttribute('transform','translate(0,0)');
    o.el.dataset.tx=0; o.el.dataset.ty=0;
    o.el.classList.add('placed','locked');
    placedSet.add(o.data.id);
    updatePuzzleStat();
  }
  active = null;
}
svg.addEventListener('pointerup', endDrag);
svg.addEventListener('pointercancel', endDrag);

/* ============ 初始化 ============ */
setMode('learn');
</script>
