<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>世界国家互动地图</title>
<style>
  :root{
    --primary:#1565C0; --primary-light:#42A5F5; --primary-dark:#0D47A1;
    --accent:#FFB300; --accent-dark:#E65100;
    --bg:#e8f4fd; --text:#2c3e50; --white:#f0f8ff;
    --card-bg:rgba(240,248,255,0.98); --border:#90caf9;
    --shadow:0 6px 24px rgba(13,71,161,0.18); --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    font-family:'Noto Sans SC',-apple-system,"Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); display:flex; flex-direction:column; min-height:100vh;
  }
  /* 顶部栏 */
  .topbar{
    display:flex;align-items:center;justify-content:space-between;flex:none;
    padding:12px 20px;
    background:linear-gradient(135deg,var(--primary-dark),var(--primary) 55%,var(--primary-light));
    color:#fff;box-shadow:var(--shadow);
  }
  .topbar h1{font-size:20px;font-weight:700;letter-spacing:1px;display:flex;align-items:center;gap:10px;}
  .topbar h1 .logo{font-size:24px;}
  .back-btn{
    display:inline-flex;align-items:center;gap:6px;
    background:rgba(255,255,255,0.16);color:#fff;text-decoration:none;
    padding:8px 16px;border-radius:30px;font-size:14px;font-weight:500;
    border:1px solid rgba(255,255,255,0.35);transition:all .25s;
  }
  .back-btn:hover{background:rgba(255,255,255,0.3);transform:translateX(-2px);}
  /* 工具栏 */
  .toolbar{
    flex:none;display:flex;align-items:center;flex-wrap:wrap;gap:10px;
    padding:12px 20px;background:var(--card-bg);border-bottom:1px solid var(--border);
    box-shadow:0 2px 10px rgba(13,71,161,0.06);
  }
  .filter-group{display:flex;flex-wrap:wrap;gap:6px;}
  .filter-btn{
    border:1px solid var(--border);background:#fff;color:var(--primary-dark);
    cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
    padding:7px 14px;border-radius:30px;transition:all .2s;
  }
  .filter-btn:hover{background:#e3f2fd;border-color:var(--primary-light);}
  .filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary-dark);box-shadow:0 3px 10px rgba(21,101,192,0.35);}
  .search-box{
    margin-left:auto;display:flex;align-items:center;gap:8px;
    background:#fff;border:1px solid var(--border);border-radius:30px;padding:6px 14px;
  }
  .search-box input{
    border:none;outline:none;font-family:inherit;font-size:14px;width:180px;background:transparent;color:var(--text);
  }
  .search-box .icon{font-size:15px;color:var(--primary);}
  /* 地图区 */
  .map-wrap{
    flex:1;position:relative;overflow:auto;
    background:linear-gradient(160deg,#dcefff,#cfe8fd);
    padding:10px;
  }
  #map{width:100%;height:auto;display:block;min-height:360px;}
  .land{fill:#bbdefb;stroke:#64b5f6;stroke-width:1;transition:fill .2s;}
  .grid-line{stroke:#cfe8fd;stroke-width:0.6;fill:none;}
  /* 国家热点 */
  .country{cursor:pointer;transition:fill .15s,stroke .15s,opacity .2s;}
  .country circle{fill:rgba(21,101,192,0.45);stroke:var(--primary-dark);stroke-width:1;transition:all .15s;}
  .country:hover circle{fill:var(--accent);stroke:var(--accent-dark);stroke-width:1.6;}
  .country.dim{opacity:.16;}
  .country.active circle{fill:var(--accent);stroke:var(--accent-dark);stroke-width:1.6;}
  .country.active:hover circle{fill:var(--accent-dark);}
  .country-label{fill:#0D47A1;font-size:9px;font-weight:600;pointer-events:none;text-anchor:middle;dominant-baseline:central;opacity:.85;}
  /* tooltip */
  #tooltip{
    position:fixed;z-index:30;pointer-events:none;opacity:0;transition:opacity .12s;
    background:rgba(13,71,161,0.95);color:#fff;padding:8px 12px;border-radius:8px;
    font-size:13px;box-shadow:0 4px 14px rgba(0,0,0,0.25);max-width:240px;line-height:1.5;
  }
  #tooltip .t-flag{font-size:18px;margin-right:4px;}
  #tooltip .t-cap{opacity:.85;font-size:12px;}
  /* 信息卡片 */
  .modal-mask{
    position:fixed;inset:0;z-index:40;background:rgba(13,71,161,0.35);
    display:flex;align-items:center;justify-content:center;padding:20px;
    opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .modal-mask.show{opacity:1;pointer-events:auto;}
  .info-card{
    width:380px;max-width:100%;background:var(--card-bg);border-radius:var(--radius);
    box-shadow:0 18px 50px rgba(13,71,161,0.35);overflow:hidden;
    transform:translateY(20px) scale(.96);transition:transform .25s;border:1px solid var(--border);
  }
  .modal-mask.show .info-card{transform:translateY(0) scale(1);}
  .card-head{
    background:linear-gradient(135deg,var(--primary-dark),var(--primary-light));
    color:#fff;padding:18px 20px;display:flex;align-items:center;gap:14px;position:relative;
  }
  .card-head .flag{font-size:42px;line-height:1;}
  .card-head .name{font-size:22px;font-weight:700;}
  .card-head .continent{font-size:12px;opacity:.9;margin-top:3px;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;display:inline-block;}
  .card-close{
    position:absolute;top:10px;right:14px;background:rgba(255,255,255,0.2);border:none;color:#fff;
    width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;
  }
  .card-close:hover{background:rgba(255,255,255,0.4);}
  .card-body{padding:18px 20px;}
  .card-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--border);font-size:14px;}
  .card-row:last-child{border-bottom:none;}
  .card-row .k{color:var(--primary-dark);font-weight:600;}
  .card-row .v{color:var(--text);text-align:right;}
  .card-intro{margin-top:12px;padding:12px;background:#e3f2fd;border-radius:10px;font-size:13px;line-height:1.7;color:#37474f;}
  /* 底部统计栏 */
  .statsbar{
    flex:none;display:flex;align-items:center;justify-content:center;gap:30px;flex-wrap:wrap;
    padding:12px 20px;background:linear-gradient(135deg,var(--primary-dark),var(--primary));
    color:#fff;box-shadow:0 -3px 14px rgba(13,71,161,0.18);
  }
  .stat{display:flex;align-items:center;gap:8px;font-size:14px;}
  .stat .lab{opacity:.85;}
  .stat .val{font-size:18px;font-weight:700;color:var(--accent);}
  .hint{font-size:12px;opacity:.8;text-align:center;padding:4px 20px 8px;background:var(--card-bg);}
  @media (max-width:640px){
    .search-box{margin-left:0;width:100%;}
    .search-box input{flex:1;width:auto;}
    .statsbar{gap:16px;}
    .stat .val{font-size:15px;}
    .info-card{width:100%;}
  }
</style>

const SVG_NS='http://www.w3.org/2000/svg';
const hotspots=document.getElementById('hotspots');
const labels=document.getElementById('labels');
const tooltip=document.getElementById('tooltip');
const modalMask=document.getElementById('modalMask');
const searchInput=document.getElementById('searchInput');
const filterGroup=document.getElementById('filterGroup');

let activeContinent='全部';
let searchTerm='';

// 渲染国家热点
countries.forEach(c=>{
  const g=document.createElementNS(SVG_NS,'g');
  g.classList.add('country');
  g.setAttribute('data-name',c.name);
  g.setAttribute('data-continent',c.continent);
  const circle=document.createElementNS(SVG_NS,'circle');
  circle.setAttribute('cx',c.x);
  circle.setAttribute('cy',c.y);
  circle.setAttribute('r',c.r);
  g.appendChild(circle);
  hotspots.appendChild(g);

  // 大国显示标签
  if(c.r>=14){
    const t=document.createElementNS(SVG_NS,'text');
    t.classList.add('country-label');
    t.setAttribute('x',c.x);
    t.setAttribute('y',c.y);
    t.textContent=c.name;
    labels.appendChild(t);
  }

  // 事件
  g.addEventListener('mouseenter',()=>showTip(c));
  g.addEventListener('mousemove',moveTip);
  g.addEventListener('mouseleave',hideTip);
  g.addEventListener('click',()=>openCard(c));
});

// tooltip
function showTip(c){
  tooltip.innerHTML=`<span class="t-flag">${c.flag}</span><b>${c.name}</b><br><span class="t-cap">首都：${c.capital} · ${c.continent}</span>`;
  tooltip.style.opacity='1';
}
function moveTip(e){
  const x=Math.min(e.clientX+14,window.innerWidth-250);
  const y=Math.min(e.clientY+14,window.innerHeight-80);
  tooltip.style.left=x+'px';
  tooltip.style.top=y+'px';
}
function hideTip(){tooltip.style.opacity='0';}

// 信息卡片
function openCard(c){
  document.getElementById('cFlag').textContent=c.flag;
  document.getElementById('cName').textContent=c.name;
  document.getElementById('cContinent').textContent=c.continent;
  document.getElementById('cCapital').textContent=c.capital;
  document.getElementById('cArea').textContent=c.area.toLocaleString('en-US')+' km²';
  document.getElementById('cPopulation').textContent=fmtPop(c.population);
  document.getElementById('cContinent2').textContent=c.continent;
  document.getElementById('cIntro').textContent=c.intro;
  modalMask.classList.add('show');
}
document.getElementById('cClose').addEventListener('click',closeCard);
modalMask.addEventListener('click',e=>{if(e.target===modalMask)closeCard();});
function closeCard(){modalMask.classList.remove('show');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeCard();});

// 大洲筛选
filterGroup.addEventListener('click',e=>{
  const btn=e.target.closest('.filter-btn');
  if(!btn)return;
  filterGroup.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeContinent=btn.dataset.continent;
  updateView();
});

// 搜索
searchInput.addEventListener('input',e=>{
  searchTerm=e.target.value.trim();
  updateView();
});

// 更新视图与统计
function updateView(){
  let count=0,popSum=0,areaSum=0;
  hotspots.querySelectorAll('.country').forEach(node=>{
    const name=node.getAttribute('data-name');
    const cont=node.getAttribute('data-continent');
    const c=countries.find(x=>x.name===name);
    const matchCont=(activeContinent==='全部'||cont===activeContinent);
    const matchSearch=(searchTerm===''||name.includes(searchTerm));
    const active=matchCont&&matchSearch;
    node.classList.toggle('active',active&&(activeContinent!=='全部'||searchTerm!==''));
    node.classList.toggle('dim',!(activeContinent==='全部'&&searchTerm==='')&&!active);
    if(active){count++;popSum+=c.population;areaSum+=c.area;}
  });
  document.getElementById('stCount').textContent=count+' 个';
  document.getElementById('stPop').textContent=fmtPop(popSum);
  document.getElementById('stArea').textContent=fmtArea(areaSum);
}

// 格式化
function fmtPop(n){
  if(n>=1e8)return (n/1e8).toFixed(2)+' 亿';
  if(n>=1e4)return (n/1e4).toFixed(0)+' 万';
  return n.toLocaleString('en-US');
}
function fmtArea(n){
  if(n>=1e8)return (n/1e8).toFixed(2)+' 亿 km²';
  if(n>=1e4)return (n/1e4).toFixed(1)+' 万 km²';
  return n.toLocaleString('en-US')+' km²';
}

// 初始化统计（全部）
updateView();
</script>
