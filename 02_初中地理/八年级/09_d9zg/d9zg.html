<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>第九单元：中国在世界中 - 初中8年级地理</title>
  <link rel="stylesheet" href="../shared/styles.css?v=8.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #0369a1;
      --primary-light: #0ea5e9;
      --primary-dark: #075985;
      --secondary: #bae6fd;
      --bg-light: #f0f9ff;
      --bg-card: #ffffff;
      --text-dark: #0c4a6e;
      --text-muted: #64748b;
      --shadow-sm: 0 2px 8px rgba(3,105,161,0.08);
      --shadow-md: 0 4px 20px rgba(3,105,161,0.12);
      --shadow-lg: 0 8px 32px rgba(3,105,161,0.16);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: var(--bg-light);
      color: var(--text-dark);
      line-height: 1.6;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(3,105,161,0.05); }
    ::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

    /* ====== Hero Section ====== */
    .hero-section {
      background: linear-gradient(135deg, #075985 0%, var(--primary) 30%, var(--primary-light) 70%, #38bdf8 100%);
      color: white;
      padding: 60px 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero-section::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }

    .hero-content { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; }

    .hero-icon { font-size: 64px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

    .hero-title {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      letter-spacing: 3px;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      opacity: 0.95;
      margin-bottom: 24px;
    }

    .key-points {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 24px 0;
      position: relative;
      flex-wrap: wrap;
    }

    .key-point {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 12px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255,255,255,0.3);
      min-width: 120px;
    }

    .key-point-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .key-point-label {
      font-size: 0.85rem;
      font-weight: 600;
      opacity: 0.9;
    }

    .progress-container {
      max-width: 600px;
      margin: 24px auto 0;
      text-align: left;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      margin-bottom: 8px;
      opacity: 0.9;
    }

    .progress-track {
      height: 8px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 4px;
      transition: width 0.6s ease;
    }

    /* ====== Main Content ====== */
    .main-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .section-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .section-title {
      font-size: 1.8rem;
      color: var(--primary);
      margin-bottom: 8px;
    }

    .section-subtitle {
      font-size: 1rem;
      color: var(--text-muted);
    }

    /* ====== Lessons Grid ====== */
    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-top: 32px;
    }

    .lesson-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s ease;
      border: 2px solid transparent;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
      border-color: var(--primary-light);
    }

    .lesson-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .lesson-num {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .lesson-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text-dark);
    }

    .lesson-desc {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .lesson-meta {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .lesson-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    /* ====== Navigation ====== */
    .nav-bar {
      background: white;
      border-bottom: 2px solid var(--primary);
      padding: 12px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-sm);
    }

    .nav-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nav-btn {
      color: var(--primary);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: var(--bg-light);
    }

    .nav-center {
      font-weight: 700;
      color: var(--primary);
      font-size: 16px;
    }

    /* ====== Footer ====== */
    .footer {
      background: var(--primary-dark);
      color: white;
      padding: 40px 20px;
      text-align: center;
      margin-top: 60px;
    }

    .footer-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: white;
    }

    /* ====== 手机端适配 ====== */
    @media (max-width: 768px) {
      .hero-section { padding: 40px 16px; }
      .hero-title { font-size: 1.6rem; letter-spacing: 1px; }
      .hero-icon { font-size: 48px; }
      
      .key-points { gap: 12px; }
      .key-point { min-width: 100px; padding: 12px; }
      
      .lessons-grid { grid-template-columns: 1fr; }
      
      .nav-inner { flex-direction: column; gap: 8px; }
      .nav-center { order: -1; }
    }
  </style>
</head>
