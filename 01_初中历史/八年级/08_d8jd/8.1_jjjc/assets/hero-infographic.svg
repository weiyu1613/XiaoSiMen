<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360" width="900" height="360">
  <defs>
    <marker id="ah" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8b4513"/>
    </marker>
    <filter id="s"><feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#0003"/></filter>
  </defs>

  <!-- 背景 -->
  <rect width="900" height="360" fill="#fdf5e6" rx="12"/>

  <!-- 中心节点 -->
  <rect x="350" y="130" width="200" height="100" rx="18" fill="#8b4513" stroke="#5a2d0c" stroke-width="3" filter="url(#s)"/>
  <text x="450" y="168" text-anchor="middle" font-size="17" font-weight="bold" fill="white" font-family="Microsoft YaHei, sans-serif">经济和社会</text>
  <text x="450" y="194" text-anchor="middle" font-size="15" fill="white" font-family="Microsoft YaHei, sans-serif">生活的变化</text>

  <!-- 分支1：民族资本主义 -->
  <rect x="30" y="40" width="180" height="64" rx="12" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="120" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="white">民族资本主义</text>
  <text x="120" y="92" text-anchor="middle" font-size="12" fill="#f5f0eb">萌芽→发展→春天→萎缩</text>
  <line x1="210" y1="72" x2="350" y2="155" stroke="#8b4513" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- 分支2：社会生活变化 -->
  <rect x="30" y="230" width="180" height="64" rx="12" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="120" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="white">社会生活变化</text>
  <text x="120" y="282" text-anchor="middle" font-size="12" fill="#f5f0eb">交通·通讯·习俗</text>
  <line x1="210" y1="262" x2="350" y2="230" stroke="#8b4513" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- 分支3：风俗习惯变迁 -->
  <rect x="670" y="40" width="180" height="64" rx="12" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="760" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="white">风俗习惯变迁</text>
  <text x="760" y="92" text-anchor="middle" font-size="12" fill="#f5f0eb">剪辫·易服·改称呼</text>
  <line x1="670" y1="72" x2="550" y2="155" stroke="#8b4513" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- 分支4：时代特征 -->
  <rect x="670" y="230" width="180" height="64" rx="12" fill="#a0522d" stroke="#8b4513" stroke-width="2"/>
  <text x="760" y="262" text-anchor="middle" font-size="14" font-weight="700" fill="white">时代特征</text>
  <text x="760" y="282" text-anchor="middle" font-size="12" fill="#f5f0eb">不平衡·半殖民地色彩</text>
  <line x1="670" y1="262" x2="550" y2="230" stroke="#8b4513" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- 底部标注 -->
  <text x="450" y="340" text-anchor="middle" font-size="12" fill="#8b4513" font-family="Microsoft YaHei, sans-serif">图8.1-1 经济和社会生活的变化 知识结构图</text>
</svg>